        const col = dc(emp.dept||'Ops')
        const lvlBadge = `<span class="level-badge level-${emp.level||1}">Level ${emp.level||1}</span>`
        const roles = (emp.roles||[]).map(function(r){
            return `<span class="badge" style="background:${r.color||'#1d4ed8'};color:#fff;margin:2px">${esc(r.code)}</span>`
        }).join('')

        let mpHtml = ''
        ;(emp.mps||[]).forEach(function(mp) {
            const mpPct = mp.kpi_total ? (mp.kpi_c/mp.kpi_total*100).toFixed(1) : null
            mpHtml += `<div class="cascade-mp-box">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                    <span class="ref-badge" style="background:#0f2540;color:#fff;font-weight:900">${esc(mp.ref)}</span>
                    <span class="font-bold text-sm flex-1">${esc(mp.title)}</span>
                    ${mpPct!==null?`<span class="badge" style="background:${mpPct>=95?'#dcfce7':mpPct>=80?'#fef3c7':'#fee2e2'};color:${mpPct>=95?'#15803d':mpPct>=80?'#92400e':'#b91c1c'}">${mpPct}%</span>`:''}
                    <span class="badge badge-blue">⌖ ${esc(mp.target||'')}</span>
                </div>`

            ;(mp.cps||[]).forEach(function(cp) {
                const hasCascade = cp.cascade_children && cp.cascade_children.length > 0
                mpHtml += `<div class="cascade-cp-row${hasCascade?' linked':''}">
                    <span class="ref-badge ref-badge-blue">${esc(cp.ref)}</span>
                    <span class="text-sm flex-1">${esc(cp.title)}</span>
                    <span class="badge badge-gray">${esc(cp.target||'')}</span>
                    ${hasCascade?'<span class="badge badge-c text-xxs">&#8595; cascades</span>':''}
                </div>`
                if (hasCascade) {
                    mpHtml += `<div class="cascade-arrow">&#8595; CP becomes MP for:</div>`
                    mpHtml += renderTreeNodes(cp.cascade_children, depth+1)
                }
            })
            mpHtml += '</div>'
        })

        return `<div style="margin-bottom:${depth===0?'24':'12'}px">
            <div class="cascade-role-box" style="border-left:4px solid ${col}">
                <div style="display:flex;align-items:center;gap:12px">
                    <div class="avatar avatar-md" style="background:${col}">${av(emp.name)}</div>
                    <div style="flex:1">
                        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                            <span style="font-size:15px;font-weight:900;font-family:'Syne',sans-serif">${esc(emp.name)}</span>
                            ${lvlBadge}
                            <span class="emp-code" style="background:rgba(255,255,255,.15);color:#fff;border-color:transparent">${esc(emp.emp_code||'')}</span>
                        </div>
                        <p style="font-size:11px;color:#93c5fd;margin-top:2px">${esc(emp.role||'')}</p>
                        ${roles?`<div style="margin-top:6px">${roles}</div>`:''}
                    </div>
                </div>
            </div>
            ${mpHtml ? `<div class="cascade-node">${mpHtml}</div>` : ''}
            ${emp.children && emp.children.length ? '<div style="margin-left:32px;border-left:2px solid var(--border);padding-left:16px;margin-top:8px">'+renderTreeNodes(emp.children, depth+1)+'</div>' : ''}
        </div>`
    }).join('')
}

// â”€â”€ BS DATE UTILITIES â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const BS_MONTHS_JS=['Baisakh','Jestha','Ashadh','Shrawan','Bhadra','Ashwin','Kartik','Mangsir','Poush','Magh','Falgun','Chaitra']
const BS_FY_Q_JS={Baisakh:'Q4',Jestha:'Q4',Ashadh:'Q4',Shrawan:'Q1',Bhadra:'Q1',Ashwin:'Q1',Kartik:'Q2',Mangsir:'Q2',Poush:'Q2',Magh:'Q3',Falgun:'Q3',Chaitra:'Q3'}
const BS_MONTH_DAYS_JS={2078:[31,31,32,32,31,30,30,29,30,29,30,30],2079:[31,32,31,32,31,30,30,30,29,29,30,30],2080:[31,32,31,32,31,30,30,30,29,30,29,31],2081:[31,31,32,32,31,30,30,30,29,30,30,30],2082:[31,32,31,32,31,30,30,30,29,30,29,31]}
function bsDays(y,mi){return(BS_MONTH_DAYS_JS[y]||[31,32,31,32,31,30,30,30,29,30,29,31])[mi]||30}
function bsMonthIdx(mn){const i=BS_MONTHS_JS.indexOf(mn);return i>=0?i:0}
function bsStr(y,mn,d){const i=bsMonthIdx(mn);return y+'-'+(i+1).toString().padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function parseBsDate(s){
  if(!s)return{y:2081,m:'Shrawan',d:1}
  const p=String(s).replace(/\//g,'-').split('-')
  if(p.length===3){const y=parseInt(p[0]),mi=parseInt(p[1])-1,d=parseInt(p[2]);if(y>2000&&mi>=0&&mi<12&&d>=1)return{y,m:BS_MONTHS_JS[mi],d:Math.min(d,bsDays(y,mi))}}
  return{y:2081,m:p[0]||'Shrawan',d:1}
}
function bsDisplay(s){if(!s)return'â€”';const{y,m,d}=parseBsDate(s);return d+' '+m+' '+y+' BS'}
function todayBS(){return S.bsToday&&S.bsToday.date?S.bsToday.date:'2081-07-01'}
function currentFYbs(){return S.bsToday&&S.bsToday.fy?S.bsToday.fy:S.currentFY}

function bsDatePicker(id,val){
  const {y,m,d}=val?parseBsDate(val):parseBsDate(todayBS())
  const yOpts=[2078,2079,2080,2081,2082].map(yr=>'<option value="'+yr+'"'+(yr===y?' selected':'')+'>'+yr+' BS</option>').join('')
  const mOpts=BS_MONTHS_JS.map((mn,i)=>'<option value="'+mn+'"'+(mn===m?' selected':'')+'>'+(i+1)+'. '+mn+'</option>').join('')
  const maxD=bsDays(y,bsMonthIdx(m))
  return '<div class="bs-date-picker" id="'+id+'-wrap">'
    +'<select id="'+id+'-y" onchange="bsPickerSync(\''+id+'\')">'+yOpts+'</select>'
    +'<select id="'+id+'-m" onchange="bsPickerSync(\''+id+'\')">'+mOpts+'</select>'
    +'<input type="number" id="'+id+'-d" value="'+d+'" min="1" max="'+maxD+'">'
    +'<span class="text-xs text-muted" id="'+id+'-lbl">'+d+' '+m+' '+y+' BS</span>'
    +'</div>'
}
function bsPickerSync(id){
  const y=parseInt(q('#'+id+'-y').value),m=q('#'+id+'-m').value
  const maxD=bsDays(y,bsMonthIdx(m)),dEl=q('#'+id+'-d')
  dEl.max=maxD; if(parseInt(dEl.value)>maxD)dEl.value=maxD
  const lbl=q('#'+id+'-lbl'); if(lbl)lbl.textContent=dEl.value+' '+m+' '+y+' BS'
}
function getBsVal(id){
  const y=q('#'+id+'-y')?.value,m=q('#'+id+'-m')?.value,d=q('#'+id+'-d')?.value
  if(!y||!m||!d)return todayBS()
  return bsStr(parseInt(y),m,parseInt(d))
}

async function loadOrgTree(){

function pctCol(p){return p===null||p===undefined?'#94a3b8':p>=95?'#16a34a':p>=80?'#d97706':'#dc2626'}

function drawOrgLevel(nodes,depth){
  if(!nodes||!nodes.length)return''
  return '<div style="display:flex;gap:20px;justify-content:center;flex-wrap:wrap;position:relative">'
    +nodes.map(n=>drawOrgNode(n,depth)).join('')+'</div>'
}

function drawOrgNode(n,depth){
  if(!n)return''
  const col=dc(n.dept||'Ops')
  const ownPct=n.own&&n.own.pct!==null?n.own.pct:null
  const rPct=n.rollup&&n.rollup.pct!==null?n.rollup.pct:null
  const roles=(n.roles||[]).map(r=>'<span class="badge" style="background:'+r.color+';color:#fff;font-size:9px;margin:1px">'+esc(r.code)+'</span>').join('')

  const lvlCls='level-'+(n.level||3)
  const mpCnt=(n.mps||[]).length, cpCnt=(n.mps||[]).reduce(function(s,m){return s+(m.cps||[]).length},0)

  let node='<div style="display:inline-flex;flex-direction:column;align-items:center">'
  node+='<div class="org-node" id="on-'+n.id+'" style="border-top:4px solid '+col+'" onclick="orgClick(\''+n.id+'\',event)">'
  node+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">'
  node+='<div class="avatar avatar-sm" style="background:'+col+';flex-shrink:0">'+av(n.name)+'</div>'
  node+='<div style="min-width:0;flex:1">'
  node+='<p style="font-weight:900;font-size:12px;font-family:\'Syne\',sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(n.name)+'</p>'
  node+='<p class="text-xxs text-muted" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(n.role||n.dept)+'</p>'
  node+='</div></div>'
  node+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px">'
  node+='<span class="level-badge '+lvlCls+'">L'+n.level+'</span>'
  if(roles)node+=roles
  node+='</div>'
  if(locs)node+='<div style="margin-bottom:5px">'+locs+'</div>'
  node+='<div style="display:flex;gap:6px;font-size:10px;color:var(--muted);margin-bottom:6px">'
  node+='<span>'+mpCnt+' MP</span><span>'+cpCnt+' CP</span><span>'+(n.children&&n.children.length||0)+' reports</span>'
  node+='</div>'
  // Own score
  node+='<div style="margin-top:4px">'
  node+='<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px">'
  node+='<span style="color:var(--muted)">Own</span>'
  node+='<span style="font-weight:700;color:'+pctCol(ownPct)+'">'+(ownPct!==null?ownPct+'%':'â€”')+'</span></div>'
  node+='<div class="rollup-bar"><div class="rollup-bar-fill" style="width:'+Math.min(ownPct||0,100)+'%;background:'+pctCol(ownPct)+'"></div></div>'
  // Rollup score
  node+='<div style="display:flex;justify-content:space-between;font-size:10px;margin-top:5px;margin-bottom:2px">'
  node+='<span style="color:var(--muted)">Rollup incl. subs</span>'
  node+='<span style="font-weight:900;font-family:\'Syne\',sans-serif;color:'+pctCol(rPct)+'">'+(rPct!==null?rPct+'%':'â€”')+'</span></div>'
  node+='<div class="rollup-bar"><div class="rollup-bar-fill" style="width:'+Math.min(rPct||0,100)+'%;background:'+pctCol(rPct)+'"></div></div>'
  node+='<div style="font-size:9px;color:var(--muted);margin-top:3px">'+  (n.rollup&&n.rollup.tot?n.rollup.comp+'/'+n.rollup.tot+' records':'No data')+'</div>'
  node+='</div>'
  // Actions
  node+='<div style="display:flex;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">'
  node+='<button class="btn btn-ghost btn-sm flex-1" style="font-size:10px" onclick="openProfile(\''+n.id+'\',event)">Profile</button>'
  node+='<button class="btn btn-ghost btn-sm" style="font-size:10px" onclick="openOrgActions(\''+n.id+'\',event)">Manage</button>'
  node+='</div></div>'

  if(n.children&&n.children.length){
    node+='<div style="width:2px;height:20px;background:var(--border)"></div>'
    node+='<div style="position:relative;display:flex;gap:16px;flex-wrap:wrap;justify-content:center">'
    if(n.children.length>1)node+='<div style="position:absolute;top:0;left:10%;right:10%;height:2px;background:var(--border)"></div>'
    n.children.forEach(function(child){
      node+='<div style="display:flex;flex-direction:column;align-items:center">'
      node+='<div style="width:2px;height:20px;background:var(--border)"></div>'
      node+=drawOrgNode(child,depth+1)
      node+='</div>'
    })
    node+='</div>'
  }
  node+='</div>'
  return node
}

// â”€â”€ CASCADE BUILDER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderCascadeBuilder(){
  const byParent={}
  S.cascade.forEach(function(lnk){if(!byParent[lnk.parent_emp_id])byParent[lnk.parent_emp_id]=[];byParent[lnk.parent_emp_id].push(lnk)})
  let html='<div class="info-box mb-16"><p><strong>Cascade rule:</strong> Superior\'s <strong>CP</strong> becomes subordinate\'s <strong>MP</strong>. Click <strong>+ New Link</strong> to map the chain.</p></div>'
  html+='<div class="section-head"><div><h2>Cascade Links</h2><p>'+S.cascade.length+' links configured</p></div>'
  html+='<button class="btn btn-primary btn-sm" onclick="openCascadeForm()">+ New Link</button></div>'
  if(!S.cascade.length){
    html+='<div class="card"><div class="card-body" style="text-align:center;padding:32px">'
    html+='<p style="font-size:28px;margin-bottom:8px">&#128279;</p><p class="font-bold">No cascade links yet</p>'
    html+='<p class="text-sm text-muted mt-8">Click <strong>+ New Link</strong> above to start mapping how a superior\'s CP becomes a subordinate\'s MP</p>'
    html+='</div></div>'
  } else {
    html+='<div style="display:flex;flex-direction:column;gap:12px">'
    Object.entries(byParent).forEach(function(kv){
      const pid=kv[0],links=kv[1],parent=getEmp(pid); if(!parent)return
      const col=dc(parent.dept)
      html+='<div class="card"><div class="card-head" style="background:'+col+'10">'
      html+='<div style="display:flex;align-items:center;gap:10px">'
      html+='<div class="avatar avatar-sm" style="background:'+col+'">'+av(parent.name)+'</div>'
      html+='<div><p style="font-weight:900">'+esc(parent.name)+'</p>'
      html+='<p class="text-xxs text-muted">'+esc(parent.emp_code||'')+' &middot; L'+parent.level+' &middot; '+esc(parent.dept)+'</p></div>'
      html+='</div></div><div class="card-body">'

async function saveAssignments(empId){
  const locId=q('#asgn-loc')?.value||''
  const mpIds=[...document.querySelectorAll('[id^="asgn-mp-"]:checked')].map(function(x){return x.id.replace('asgn-mp-','')})
  const cpIds=[...document.querySelectorAll('[id^="asgn-cp-"]:checked')].map(function(x){return x.id.replace('asgn-cp-','')})
  await api.post('/api/emp_links/'+empId,{role_ids:(getEmp(empId)?.role_ids||[]),mp_ids:mpIds,cp_ids:cpIds})
  if(locId){
    for(const mid of mpIds) await api.post('/api/org/assign_mp',{emp_id:empId,mp_id:mid,loc_id:locId})
    for(const cid of cpIds) await api.post('/api/org/assign_cp',{emp_id:empId,cp_id:cid,loc_id:locId})
  }
  toast('Assignments saved','ok'); await loadAll()
  selectAssignEmp(empId)
}

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div>
      <h2 style="font-family:'Syne',sans-serif;font-size:18px">${activeDashLayout?esc(activeDashLayout.name):'Dashboard'}</h2>
      <p class="text-xs text-muted">FY ${S.currentFY} · ${widgets.length} widgets</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="switchTab('master');switchMaster('dashboard_builder')">⚙ Edit Layout</button>
      <button class="btn btn-ghost btn-sm" onclick="activeDashLayout=null;renderDefaultDashboard()">Default View</button>
    </div>
  </div>`

  // Build grid based on widget sizes
  html += '<div id="dash-widget-grid" style="display:grid;grid-template-columns:repeat(12,1fr);gap:14px">'
  widgets.forEach((w,i) => {
    const span = w.size==='full'?12:w.size==='half'?6:w.size==='third'?4:6
    html += `<div style="grid-column:span ${span}" id="dw-wrap-${i}">
      <div class="card" style="height:100%">
        <div class="card-head" style="display:flex;justify-content:space-between">
          <p>${esc(w.title||WIDGET_TYPES.find(t=>t.id===w.type)?.label||w.type)}</p>
          <span style="font-size:18px">${WIDGET_TYPES.find(t=>t.id===w.type)?.icon||'📊'}</span>
        </div>
        <div class="card-body" id="dw-body-${i}"><div class="spinner"></div></div>
      </div>
    </div>`
  })
  html += '</div>'
  q('#tab-dashboard').innerHTML = html

  // Load each widget asynchronously
  for (let i=0; i<widgets.length; i++) {
    await loadWidget(i, widgets[i])
  }
}

async function loadWidget(idx, cfg) {
  const el = q(`#dw-body-${idx}`)
  if (!el) return
  const fy = cfg.fy || S.currentFY
  const params = new URLSearchParams({metric: cfg.metric||'overall', fy})
  if (cfg.loc)    params.set('loc', cfg.loc)
  if (cfg.emp_id) params.set('emp_id', cfg.emp_id)
  if (cfg.sector) params.set('sector', cfg.sector)
  if (cfg.mp_ref) params.set('mp_ref', cfg.mp_ref)
  // Show employee context in widget header if filtered
  if (cfg.emp_id) {
    const emp = getEmp(cfg.emp_id)
    if (emp) {
      const head = el.closest('.card')?.querySelector('.card-head p')
      if (head && !head.dataset.empSet) {
        head.dataset.empSet = '1'
        head.innerHTML += ` <span class="badge badge-blue" style="margin-left:6px">${esc(emp.name)}</span>`
      }
    }
  }

  let data
  try { data = await api.get('/api/analytics/widget?'+params.toString()) }
  catch(e) { el.innerHTML='<p class="text-sm text-muted italic">Error loading widget.</p>'; return }

  const wtype = cfg.type
  const canvasId = `dwc-${idx}`

  if (wtype === 'stat_box') {
    const s = data.summary||{}
    el.innerHTML = `<div class="grid-3">
      <div class="stat-box"><div class="val" style="color:var(--blue)">${(s.tot||0).toLocaleString()}</div><div class="lbl">Total</div></div>
      <div class="stat-box"><div class="val" style="color:var(--green)">${(s.comp||0).toLocaleString()}</div><div class="lbl">Compliant</div><div class="sub">${s.pct||0}%</div></div>
      <div class="stat-box"><div class="val" style="color:var(--red)">${(s.nc||0).toLocaleString()}</div><div class="lbl">Non-Compliant</div></div>
    </div>`
    return
  }

  if (wtype === 'kpi_overall') {
    const s = data.summary||{}
    const pctVal = s.pct||0
    const col = pctVal>=95?'#16a34a':pctVal>=80?'#d97706':'#dc2626'
    el.innerHTML = `<div style="text-align:center;padding:16px">
      <canvas id="${canvasId}" height="120" style="max-width:180px;margin:0 auto"></canvas>
      <div style="font-size:32px;font-weight:900;font-family:'Syne',sans-serif;color:${col};margin-top:-50px">${pctVal}%</div>
      <div style="font-size:11px;color:var(--muted);margin-top:48px">${(s.comp||0).toLocaleString()} / ${(s.tot||0).toLocaleString()} compliant</div>
    </div>`
    const cv = q(`#${canvasId}`)
    if (cv) dashWidgetCharts[canvasId] = new Chart(cv, {
      type:'doughnut',
      data:{labels:['Compliant','Non-Compliant'],datasets:[{data:[s.comp||0,s.nc||0],backgroundColor:[col,'#f1f5f9'],borderWidth:0,borderRadius:4}]},
      options:{cutout:'78%',plugins:{legend:{display:false}},animation:{animateRotate:true}}
    })
    return
  }

  if (wtype === 'mp_cards') {
    const fyPerf = perfByFY(fy)
    let html = '<div class="grid-auto">'
    S.mps.forEach(mp => {
      const mpPerf = fyPerf.filter(p=>p.mp_ref===mp.ref)
      const {pct_c:mpc} = complianceSummary(mpPerf)
      const col = pc(mp.pct!=null?mp.pct:mpc)
      html += `<div class="compliance-card">
        <div class="cc-title"><span class="cc-ref">${esc(mp.ref)}</span><span class="cc-pct" style="color:${col}">${mp.pct!=null?mp.pct:mpc}%</span></div>
        <div class="cc-bar"><span class="cc-bar-c" style="width:${Math.min(mp.pct||mpc,100)}%;background:${col}"></span></div>
        <p class="text-xxs text-muted mt-4">${esc(mp.title.slice(0,50))}</p>
      </div>`
    })
    html += '</div>'
    el.innerHTML = html
    return
  }

  // Chart-based widgets
  if (!data.labels||!data.labels.length) {
    el.innerHTML='<p class="text-sm text-muted italic" style="padding:12px">No data for selected filters.</p>'
    return
  }

  el.innerHTML = `<canvas id="${canvasId}" height="${cfg.size==='full'?60:90}"></canvas>`
  const cv = q(`#${canvasId}`)
  if (!cv) return

  const isLine = wtype==='line_trend'
  const isPie  = wtype==='pie_status'
  const chartType = isPie?'doughnut':isLine?'line':'bar'
  const bgColors = isPie ? ['#16a34a','#dc2626'] : data.labels.map((_,i)=>CHART_COLORS[i%CHART_COLORS.length])

  dashWidgetCharts[canvasId] = new Chart(cv, {
    type: chartType,
    data: {
      labels: data.labels,
      datasets: [{
        label: cfg.title||'Compliance %',
        data: data.values,
        backgroundColor: isLine?'rgba(29,78,216,0.1)':bgColors,
        borderColor: isLine?'#1d4ed8':bgColors,
        borderWidth: isLine?2:0,
        borderRadius: isPie?0:8,
        fill: isLine,
        tension: 0.4,
        pointBackgroundColor: '#1d4ed8',
      }]
    },
    options: {
      responsive:true,
      plugins:{legend:{display:isPie},tooltip:{callbacks:{label:function(ctx){return ctx.parsed+(isPie?'':' %')}}}},
      scales: isPie?{}:{
        y:{min:0,max:100,ticks:{callback:v=>v+'%'},grid:{color:'#f1f5f9'}},
        x:{grid:{display:false},ticks:{maxRotation:45}}
      }
    }
  })
}

// ══════════════════════════════════════════════════════════════════════════════
// DASHBOARD BUILDER (lives in Master Setup)
// ══════════════════════════════════════════════════════════════════════════════
let builderWidgets = []   // working copy of widgets being configured
let builderLayoutId = null
let builderLayoutName = 'My Dashboard'
let dragSrcIdx = null

function renderDashboardBuilder() {
  const layouts = S.dashLayouts || []
  const fyOpts = S.cache.map(c=>`<option value="${c.fy}">${c.fy}</option>`).join('')
  const locOpts = S.locations.map(l=>`<option value="${esc(l.code)}">${esc(l.name)}</option>`).join('')
  const empOpts = S.employees.map(e=>`<option value="${e.id}">${esc(e.name)} (${esc(e.emp_code||'')})</option>`).join('')
  const sectorOpts = [...new Set(S.employees.map(e=>e.dept))].map(d=>`<option value="${d}">${d}</option>`).join('')
  const mpOpts = S.mps.map(m=>`<option value="${esc(m.ref)}">${esc(m.ref)} — ${esc(m.title.slice(0,40))}</option>`).join('')

  // Layout selector
  let layoutSelect = `<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px">
    <select class="form-select" id="bldr-layout-sel" style="width:200px" onchange="loadBuilderLayout(this.value)">
      <option value="">— New Layout —</option>
      ${layouts.map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join('')}
    </select>
    <input class="form-input" id="bldr-name" value="${esc(builderLayoutName)}" placeholder="Layout name" style="width:200px">
    <button class="btn btn-primary btn-sm" onclick="saveBuilderLayout()">💾 Save Layout</button>
    <button class="btn btn-success btn-sm" onclick="applyBuilderLayout()">▶ Apply to Dashboard</button>
    ${builderLayoutId?`<button class="btn btn-danger btn-sm" onclick="deleteBuilderLayout()">🗑 Delete</button>`:''}
  </div>`

  // Widget palette
  let palette = `<div class="card mb-16"><div class="card-head"><p>Widget Palette — click to add</p></div><div class="card-body">
    <div style="display:flex;gap:8px;flex-wrap:wrap">`
  WIDGET_TYPES.forEach(wt => {
    palette += `<button class="btn btn-ghost btn-sm" style="border:1.5px solid var(--border)" onclick="addBuilderWidget('${wt.id}')">
      ${wt.icon} ${wt.label}
    </button>`
  })
  palette += `</div></div></div>`

  // Widget canvas
  let canvas = `<div class="card"><div class="card-head" style="display:flex;justify-content:space-between">
    <p>Layout Canvas — ${builderWidgets.length} widgets</p>
    <button class="btn btn-ghost btn-sm" onclick="builderWidgets=[];renderDashboardBuilder()">Clear All</button>
  </div><div class="card-body">`

  if (!builderWidgets.length) {
    canvas += `<div style="text-align:center;padding:40px;color:var(--muted)">
      <p style="font-size:32px">📐</p>
      <p class="font-bold mt-8">No widgets yet</p>
      <p class="text-sm mt-4">Click any widget type above to add it to the layout</p>
    </div>`
  } else {
    canvas += `<div id="bldr-canvas" style="display:flex;flex-direction:column;gap:10px">`
    builderWidgets.forEach((w,i) => {
      const wt = WIDGET_TYPES.find(t=>t.id===w.type)||{icon:'📊',label:w.type}
      canvas += `<div class="bldr-widget-row" id="bwr-${i}" draggable="true"
        ondragstart="bldrDragStart(${i})" ondragover="bldrDragOver(event,${i})" ondrop="bldrDrop(event,${i})"
        style="border:1.5px solid var(--border);border-radius:10px;padding:12px;background:#fff;cursor:grab">
        <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap">
          <span style="font-size:22px;flex-shrink:0">${wt.icon}</span>
          <div style="flex:1;min-width:200px">
            <p class="font-bold text-sm">${wt.label}</p>
            <input class="form-input" style="margin-top:6px;font-size:12px" placeholder="Widget title (optional)"
              value="${esc(w.title||'')}" oninput="builderWidgets[${i}].title=this.value">
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <div>
              <label class="form-label" style="margin-bottom:2px">Size</label>
              <select class="form-select" style="font-size:11px;padding:4px 8px" onchange="builderWidgets[${i}].size=this.value">
                <option value="half" ${w.size==='half'?'selected':''}>Half (6/12)</option>
                <option value="full" ${w.size==='full'?'selected':''}>Full Width</option>
                <option value="third" ${w.size==='third'?'selected':''}>Third (4/12)</option>
              </select>
            </div>
            <div>
              <label class="form-label" style="margin-bottom:2px">FY</label>
              <select class="form-select" style="font-size:11px;padding:4px 8px" onchange="builderWidgets[${i}].fy=this.value">
                <option value="">Current FY</option>${fyOpts}
              </select>
            </div>
            <div>
              <label class="form-label" style="margin-bottom:2px">Metric</label>
              <select class="form-select" style="font-size:11px;padding:4px 8px" onchange="builderWidgets[${i}].metric=this.value">
                <option value="overall" ${(w.metric||'overall')==='overall'?'selected':''}>Overall</option>
                <option value="by_month" ${w.metric==='by_month'?'selected':''}>By Month</option>
                <option value="by_mp" ${w.metric==='by_mp'?'selected':''}>By MP</option>
                <option value="by_emp" ${w.metric==='by_emp'?'selected':''}>By Employee</option>
                <option value="by_location" ${w.metric==='by_location'?'selected':''}>By Location</option>
                <option value="by_sector" ${w.metric==='by_sector'?'selected':''}>By Sector</option>
                <option value="by_emp_detail" ${w.metric==='by_emp_detail'?'selected':''}>Employee Monthly (single emp)</option>
              </select>
            </div>
            <div>
              <label class="form-label" style="margin-bottom:2px">Filter Location</label>
              <select class="form-select" style="font-size:11px;padding:4px 8px" onchange="builderWidgets[${i}].loc=this.value">
                <option value="">All</option>${locOpts}
              </select>
            </div>
            <div>
              <label class="form-label" style="margin-bottom:2px">Filter Sector</label>
              <select class="form-select" style="font-size:11px;padding:4px 8px" onchange="builderWidgets[${i}].sector=this.value">
                <option value="">All</option>${sectorOpts}
              </select>
            </div>
            <div>
              <label class="form-label" style="margin-bottom:2px">Filter Employee</label>
              <select class="form-select" style="font-size:11px;padding:4px 8px" onchange="builderWidgets[${i}].emp_id=this.value">
                <option value="">All Employees</option>${empOpts}
              </select>
            </div>
            <div>
              <label class="form-label" style="margin-bottom:2px">Filter MP</label>
              <select class="form-select" style="font-size:11px;padding:4px 8px" onchange="builderWidgets[${i}].mp_ref=this.value">
                <option value="">All MPs</option>${mpOpts}
              </select>
            </div>
            <button class="btn btn-danger btn-sm" style="margin-top:18px" onclick="removeBuilderWidget(${i})">✕</button>
            <span style="margin-top:18px;color:var(--muted);font-size:18px;cursor:grab" title="Drag to reorder">⠿</span>
          </div>
        </div>
      </div>`
    })
    canvas += `</div>`
  }
  canvas += `</div></div>`

  q('#master-content').innerHTML = `<div class="section-head">
    <div><h2>📊 Dashboard Builder</h2>
    <p>Design your Power BI-style dashboard — choose widgets, filters, sizes, then save and apply.</p></div>
  </div>` + layoutSelect + palette + canvas
}

function addBuilderWidget(type) {
  builderWidgets.push({type, title:'', size:'half', fy:'', metric:'overall', loc:'', sector:'', emp_id:'', mp_ref:''})
  renderDashboardBuilder()
  // Scroll to bottom of canvas
  const el = q('#bldr-canvas')
  if (el) setTimeout(()=>el.lastElementChild?.scrollIntoView({behavior:'smooth'}), 100)
}

function removeBuilderWidget(idx) {
  builderWidgets.splice(idx,1)
  renderDashboardBuilder()
}

// Drag & drop reorder
function bldrDragStart(idx) { dragSrcIdx=idx }
function bldrDragOver(e,idx) { e.preventDefault(); qq('.bldr-widget-row').forEach(r=>r.style.background='#fff'); const el=q(`#bwr-${idx}`); if(el)el.style.background='#eff6ff' }
function bldrDrop(e,idx) {
  e.preventDefault()
  if(dragSrcIdx===null||dragSrcIdx===idx)return
  const moved=builderWidgets.splice(dragSrcIdx,1)[0]
  builderWidgets.splice(idx,0,moved)
  dragSrcIdx=null
  renderDashboardBuilder()
}

function loadBuilderLayout(id) {
  if (!id) { builderWidgets=[]; builderLayoutId=null; builderLayoutName='My Dashboard'; renderDashboardBuilder(); return }
  const layout = S.dashLayouts.find(l=>l.id===id)
  if (!layout) return
  builderLayoutId = layout.id
  builderLayoutName = layout.name
  builderWidgets = JSON.parse(JSON.stringify(layout.layout||[]))
  renderDashboardBuilder()
  // Set the name field
  const nameEl = q('#bldr-name')
  if (nameEl) nameEl.value = layout.name
  // Set the selector
  const sel = q('#bldr-layout-sel')
  if (sel) sel.value = id
}

async function saveBuilderLayout() {
  const name = q('#bldr-name')?.value?.trim() || 'My Dashboard'
  const payload = {name, layout: builderWidgets, user:'default'}
  if (builderLayoutId) payload.id = builderLayoutId
  const res = await api.post('/api/dashboard_layouts', payload)
  if (res.id) {
    builderLayoutId = res.id
    toast('Layout saved: '+name,'ok')
    await loadAll()
    renderDashboardBuilder()
  } else toast('Save failed','error')
}

async function applyBuilderLayout() {
  await saveBuilderLayout()
  // Set as active layout
  const layout = S.dashLayouts.find(l=>l.id===builderLayoutId)
  if (layout) { activeDashLayout=layout; switchTab('dashboard') }
  else { switchTab('dashboard') }
}

async function deleteBuilderLayout() {
  if (!builderLayoutId) return
  if (!confirm('Delete this dashboard layout?')) return
  await api.del('/api/dashboard_layouts/'+builderLayoutId)
  builderLayoutId=null; builderWidgets=[]; builderLayoutName='My Dashboard'
  toast('Layout deleted','ok')
  await loadAll()
  renderDashboardBuilder()
}
// ── END DYNAMIC DASHBOARD ENGINE ─────────────────────────────────────────────

// ── INIT ─────────────────────────────────────────────────────────────────────
loadAll()
</script>
