<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sipradi SC-MPCP System</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
// ── LOCATIONS ─────────────────────────────────────────────────────────────────
const LOC_COLORS = {Office:'#1d4ed8',Border:'#b45309',Warehouse:'#047857',Depot:'#6d28d9',Branch:'#0891b2'}

function renderLocations() {
    let html = '<div class="section-head"><div><h2>Workstation Locations</h2><p>'+S.locations.length+' locations &middot; staff can belong to multiple workstations</p></div>'
    html += '<button class="btn btn-primary btn-sm" onclick="openLocForm()">+ New Location</button></div><div class="grid-3">'
    S.locations.forEach(loc => {
        const emps = (loc.emp_ids||[]).map(getEmp).filter(Boolean)
        const color = LOC_COLORS[loc.type]||'#475569'
        html += '<div class="card" style="border-top:3px solid '+color+';padding:16px">'
        html += '<div class="flex justify-between items-start mb-8">'
        html += '<span class="ref-badge" style="font-size:12px;font-weight:900">'+esc(loc.code)+'</span>'
        html += '<span class="badge" style="background:'+color+'20;color:'+color+';font-weight:700">'+esc(loc.type)+'</span></div>'
        html += '<p class="font-black" style="font-size:14px">'+esc(loc.name)+'</p>'
        if(loc.address) html += '<p class="text-xs text-muted mt-4">&#128205; '+esc(loc.address)+'</p>'
        html += '<div class="mt-12 flex gap-4" style="flex-wrap:wrap">'
        if(emps.length) emps.forEach(e=>{ html += '<span class="owner-chip" style="background:'+dc(e.dept)+'" onclick="openProfile(''+e.id+'',event)">'+e.name.split(' ')[0]+'</span>' })
        else html += '<span class="text-xs text-muted italic">No staff assigned</span>'
        html += '</div><p class="text-xxs text-muted mt-8">'+emps.length+' staff assigned</p>'
        html += '<div class="flex gap-6 mt-12" style="border-top:1px solid var(--border);padding-top:10px">'
        html += '<button class="btn btn-ghost btn-sm flex-1" onclick="openLocForm(''+loc.id+'')">Edit</button>'
        html += '<button class="btn btn-sm flex-1" style="background:#fee2e2;color:#b91c1c" onclick="delLoc(''+loc.id+'')">Delete</button>'
        html += '</div></div>'
    })
    html += '</div>'
    q('#master-content').innerHTML = html
}

function openLocForm(id) {
    const loc = id ? S.locations.find(function(l){return l.id===id}) : null
    const TYPES = ['Office','Border','Warehouse','Depot','Branch']
    const typeOpts = TYPES.map(function(t){return '<option'+(loc&&loc.type===t?' selected':'')+'>'+t+'</option>'}).join('')
    const body = '<div class="form-grid-2">'
        + '<div class="form-group"><label class="form-label">Location Code</label>'
        + '<input class="form-input" id="lf-code" value="'+(loc?esc(loc.code):'')+'" placeholder="e.g. BORDER, WH-KTM"></div>'
        + '<div class="form-group"><label class="form-label">Type</label>'
        + '<select class="form-select" id="lf-type">'+typeOpts+'</select></div></div>'
        + '<div class="form-group"><label class="form-label">Location Name</label>'
        + '<input class="form-input" id="lf-name" value="'+(loc?esc(loc.name):'')+'"></div>'
        + '<div class="form-group"><label class="form-label">Address / Description</label>'
        + '<input class="form-input" id="lf-addr" value="'+(loc?esc(loc.address||''):'')+'"></div>'
        + '<div class="form-group"><label class="form-label">Staff at this Location</label>'
        + buildOwnerPicker('lf-emps', loc?loc.emp_ids||[]:[])+' </div>'
    openModal(loc?'Edit Location':'Add Workstation Location', body,
    [{label: loc?'Save Changes':'Create Location', cls:'btn-primary', fn: async function(){
        const d = {code:q('#lf-code').value.trim(), name:q('#lf-name').value.trim(),
                   type:q('#lf-type').value, address:q('#lf-addr').value.trim(),
                   emp_ids: getOwnerPicked('lf-emps')}
        if(!d.code||!d.name){toast('Code and name required','error');return}
        if(loc){d.id=loc.id; await api.put('/api/locations/'+loc.id,d)}
        else await api.post('/api/locations',d)
        toast(loc?'Location updated':'Location created','ok'); closeModal(); await loadAll()
    }}], true)
}

async function delLoc(id){
    if(!confirm('Delete this location? Staff assignments will be removed.'))return
    await api.del('/api/locations/'+id); toast('Deleted','ok'); await loadAll()
}

async function renderLocationReport() {
    setSpinner('report-content')
    const data = await api.get('/api/analytics/by_location?fy='+encodeURIComponent(S.currentFY))
    const entries = Object.entries(data)
    let html = '<div class="section-head mb-20"><div>'
    html += '<h2>Performance by Location &mdash; FY '+esc(S.currentFY)+'</h2>'
    html += '<p>Compliance rates aggregated by workstation. Staff may appear in multiple locations.</p>'
    html += '</div></div>'
    html += '<div class="grid-3 mb-20">'
    entries.forEach(function(kv){
        const loc = kv[1]
        html += compCard({ref:kv[0], title:loc.name+' · '+loc.type,
            tot:loc.total, comp:loc.compliant, nc:loc.nc,
            pct_c:loc.pct_c, pct_nc:loc.pct_nc,
            color: LOC_COLORS[loc.type]||'#475569'})
    })
    html += '</div>'
    html += '<div class="card mb-20"><div class="card-head"><p>Staff Assignments by Location</p></div><div class="card-body">'
    html += '<div class="tbl-wrap"><table><thead><tr>'
    html += '<th>Location</th><th>Type</th><th>Address</th><th>Staff</th><th>Compliance</th>'
    html += '</tr></thead><tbody>'
    entries.forEach(function(kv){
        const code=kv[0]; const loc=kv[1]
        const color = LOC_COLORS[loc.type]||'#475569'
        const emps = (loc.emp_ids||[]).map(getEmp).filter(Boolean)
        html += '<tr>'
        html += '<td><span class="ref-badge" style="font-weight:900">'+esc(code)+'</span> <span class="font-bold">'+esc(loc.name)+'</span></td>'
        html += '<td><span class="badge" style="background:'+color+'20;color:'+color+'">'+esc(loc.type)+'</span></td>'
        html += '<td class="text-muted text-xs">'+esc(loc.address||'&mdash;')+'</td>'
        html += '<td>'+emps.map(function(e){return '<span class="owner-chip" style="background:'+dc(e.dept)+'" onclick="openProfile(''+e.id+'',event)">'+e.name.split(' ')[0]+'</span>'}).join('')+'</td>'
        if(loc.total>0){
            const col = loc.pct_c>=95?'var(--green)':loc.pct_c>=80?'var(--amber)':'var(--red)'
            html += '<td><span class="font-black" style="color:'+col+'">'+loc.pct_c+'%</span> <span class="text-xs text-muted">('+loc.compliant+'/'+loc.total+')</span></td>'
        } else { html += '<td><span class="text-muted text-xs">No data</span></td>' }
        html += '</tr>'
    })
    html += '</tbody></table></div></div></div>'
    html += '<div class="card"><div class="card-head"><p>Location Compliance Chart</p></div>'
    html += '<div class="card-body"><canvas id="loc-chart" height="80"></canvas></div></div>'
    q('#report-content').innerHTML = html
    destroyChart('loc-chart')
    const labels = entries.map(function(kv){return kv[1].name})
    const pcts   = entries.map(function(kv){return kv[1].pct_c})
    const bgs    = entries.map(function(kv){return LOC_COLORS[kv[1].type]||'#475569'})
    charts['loc-chart'] = new Chart(q('#loc-chart'), {
        type:'bar',
        data:{labels:labels, datasets:[{label:'Compliance %', data:pcts, backgroundColor:bgs, borderRadius:8}]},
        options:{responsive:true, plugins:{legend:{display:false}},
            scales:{y:{min:0,max:100,ticks:{callback:function(v){return v+'%'}},grid:{color:'#f1f5f9'}},
                    x:{grid:{display:false}}}}
    })
}

</script>
<style>
:root{
  --bg:#f0f2f7;--surface:#fff;--border:#e2e6ef;--text:#0f1a2e;--muted:#6b7a99;
  --navy:#0a1628;--blue:#1d4ed8;--green:#16a34a;--amber:#d97706;--red:#dc2626;
  --violet:#6d28d9;--teal:#0891b2;
  --hod:#0f2540;--vehicle:#1d4ed8;--registration:#6d28d9;
  --warehouse:#047857;--stock:#b45309;--ops:#475569;
  --radius:12px;--shadow:0 2px 16px rgba(0,0,0,.08)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
h1,h2,h3{font-family:'Syne',sans-serif}

/* ── HEADER ── */
#header{background:linear-gradient(135deg,#0a1628 0%,#0f2540 100%);padding:12px 24px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.4)}
#header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
#header h1{font-size:18px;color:#fff;letter-spacing:-.5px}
#header-meta{font-size:11px;color:#93c5fd;margin-top:2px}
#header-meta span{margin-right:12px}
#header-meta .dot{color:#4ade80}
#header-meta .fy-pill{background:rgba(255,255,255,.15);padding:2px 10px;border-radius:20px;font-weight:700;color:#fbbf24;font-family:'Syne',sans-serif}
.hdr-actions{display:flex;gap:8px}
.hbtn{font-size:11px;color:#93c5fd;border:1px solid rgba(255,255,255,.2);background:transparent;padding:5px 12px;border-radius:8px;cursor:pointer;transition:.2s;font-family:'Syne',sans-serif;font-weight:700}
.hbtn:hover{color:#fff;border-color:rgba(255,255,255,.5)}
#nav{display:flex;gap:0;overflow-x:auto}
.nav-tab{font-size:12px;font-weight:700;font-family:'Syne',sans-serif;padding:10px 20px;border:none;background:transparent;color:#93c5fd;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;letter-spacing:.3px}
.nav-tab:hover{color:#fff}.nav-tab.active{color:#fff;border-bottom-color:#60a5fa}

/* ── LAYOUT ── */
#app{max-width:1400px;margin:0 auto;padding:20px}
.tab-panel{display:none}.tab-panel.active{display:block}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);background:#f8fafc;border-radius:var(--radius) var(--radius) 0 0;display:flex;align-items:center;justify-content:space-between}
.card-head p{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-family:'Syne',sans-serif}
.card-body{padding:18px}

/* ── GRID ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
@media(max-width:900px){.grid-2,.grid-3,.grid-4,.grid-5{grid-template-columns:1fr!important}}

/* ── STAT BOX ── */
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;text-align:center}
.stat-box .val{font-size:28px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.stat-box .lbl{font-size:11px;color:var(--muted);margin-top:4px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.stat-box .sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── COMPLIANCE CARD (the key display widget) ── */
.compliance-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.compliance-card .cc-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif}
.compliance-card .cc-ref{font-family:monospace;font-size:11px;font-weight:900;background:#0f2540;color:#fff;padding:2px 8px;border-radius:6px}
.compliance-card .cc-pct{font-size:24px;font-weight:900;font-family:'Syne',sans-serif}
.compliance-card .cc-bar{height:10px;border-radius:20px;background:#f1f5f9;overflow:hidden;margin:8px 0}
.compliance-card .cc-bar-c{height:100%;border-radius:20px;display:inline-block;vertical-align:top;transition:.6s}
.compliance-card .cc-bar-nc{height:100%;border-radius:0 20px 20px 0;display:inline-block;vertical-align:top}
.compliance-card .cc-nums{display:flex;gap:16px;font-size:11px;flex-wrap:wrap;margin-top:4px}
.cc-total{color:var(--muted);font-weight:600}.cc-c{color:var(--green);font-weight:700}.cc-nc{color:var(--red);font-weight:700}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;border:none;cursor:pointer;transition:.15s;letter-spacing:.3px;text-decoration:none}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1e40af}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted)}.btn-ghost:hover{background:#f8fafc;color:var(--text)}
.btn-amber{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}.btn-amber:hover{background:#fde68a}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-icon{padding:6px;border-radius:8px;background:transparent;border:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:13px;transition:.15s}.btn-icon:hover{background:#f0f2f7;color:var(--text)}

/* ── FORMS (exact Master Setup style) ── */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px;font-family:'Syne',sans-serif}
.form-input,.form-select,.form-textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;background:#f8fafc;transition:.15s;font-family:'DM Sans',sans-serif;color:var(--text)}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(29,78,216,.1)}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#f8fafc;border-bottom:2px solid var(--border)}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);white-space:nowrap;font-family:'Syne',sans-serif}
tbody tr{border-bottom:1px solid var(--border)}.tbody tr:last-child{border:none}
tbody tr:hover{background:#f8fafc}
tbody td{padding:10px 14px;vertical-align:middle}

/* ── BADGES ── */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;font-family:'Syne',sans-serif;letter-spacing:.3px}
.badge-c{background:#dcfce7;color:#15803d}
.badge-nc{background:#fee2e2;color:#b91c1c}
.badge-pct-green{background:#dcfce7;color:#15803d}
.badge-pct-amber{background:#fef3c7;color:#92400e}
.badge-pct-red{background:#fee2e2;color:#b91c1c}
.badge-gray{background:#f1f5f9;color:#475569}
.badge-blue{background:#dbeafe;color:#1e40af}
.dept-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;color:#fff}
.ref-badge{font-family:monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:#f1f5f9;color:#334155}
.ref-badge-blue{background:#dbeafe;color:#1e40af}
.emp-code{font-family:monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd}

/* ── AVATAR ── */
.avatar{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-family:'Syne',sans-serif;flex-shrink:0}
.avatar-sm{width:32px;height:32px;font-size:11px}
.avatar-md{width:42px;height:42px;font-size:14px}
.avatar-lg{width:56px;height:56px;font-size:20px}

/* ── MP CARDS ── */
.mp-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.2s}
.mp-card:hover{border-color:#93c5fd;box-shadow:0 4px 20px rgba(29,78,216,.12)}
.mp-card.expanded{border-color:var(--blue);box-shadow:0 6px 32px rgba(29,78,216,.2)}
.mp-card-head{padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.mp-ref{font-family:monospace;font-size:11px;font-weight:900;color:#fff;background:#0f2540;padding:4px 8px;border-radius:6px;display:block;text-align:center;white-space:nowrap}
.mp-pct{font-size:20px;font-weight:900;font-family:'Syne',sans-serif;text-align:center;margin-top:4px}
.mp-body{flex:1;min-width:0}
.mp-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.4}
.mp-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;background:#f1f5f9;color:#475569}
.tag-blue{background:#dbeafe;color:#1e40af}
.tag-violet{background:#ede9fe;color:#5b21b6}
.tag-green{background:#dcfce7;color:#15803d}
.tag-red{background:#fee2e2;color:#b91c1c}
.mp-owners{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.owner-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;color:#fff;cursor:pointer;transition:.15s}
.owner-chip:hover{opacity:.8}
.mp-expand{display:none;background:#f8faff;border-top:1px solid #dbeafe;padding:16px}
.mp-expand.open{display:block}
.cp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:10px}
.cp-card{background:#fff;border:1px solid #dbeafe;border-radius:10px;padding:12px;transition:.15s}
.cp-card:hover{border-color:#93c5fd}
.cp-ref{font-family:monospace;font-size:10px;font-weight:700;background:#dbeafe;color:#1e40af;padding:2px 6px;border-radius:4px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:16px;width:100%;max-width:600px;box-shadow:0 24px 80px rgba(0,0,0,.3);margin:auto}
.modal.wide{max-width:820px}
.modal-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;border-radius:16px 16px 0 0;z-index:10}
.modal-head h3{font-size:15px;font-weight:800;font-family:'Syne',sans-serif}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:20px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.15s}
.modal-close:hover{background:#f1f5f9;color:var(--text)}
.modal-body{padding:24px;max-height:70vh;overflow-y:auto}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:#f8fafc;border-radius:0 0 16px 16px}

/* ── OWNER/ITEM PICKERS (Master Setup style) ── */
.owner-list{border:1.5px solid var(--border);border-radius:10px;max-height:200px;overflow-y:auto;background:#f8fafc}
.owner-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.owner-item:last-child{border:none}.owner-item:hover{background:#fff}
.owner-item input{width:16px;height:16px;accent-color:var(--blue);cursor:pointer}
.item-list{border:1.5px solid var(--border);border-radius:10px;max-height:180px;overflow-y:auto;background:#f8fafc}
.item-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.item-row:last-child{border:none}.item-row:hover{background:#fff}
.item-row input{width:15px;height:15px;accent-color:var(--blue);cursor:pointer}

/* ── SUB-TABS ── */
.sub-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;gap:0;overflow-x:auto}
.sub-tab{font-size:12px;font-weight:700;font-family:'Syne',sans-serif;padding:10px 18px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s;letter-spacing:.3px}
.sub-tab:hover{color:var(--text)}.sub-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── SEARCH ── */
.search-wrap{position:relative}.search-wrap input{padding-left:32px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:13px}

/* ── HOD BANNER ── */
.hod-banner{background:linear-gradient(135deg,#0a1628 0%,#0f2540 100%);border-radius:16px;padding:22px 28px;display:flex;flex-wrap:wrap;align-items:center;gap:24px;margin-bottom:20px}
.hod-stats{display:flex;gap:12px;flex-wrap:wrap;margin-left:auto}
.hod-stat{background:rgba(255,255,255,.1);border-radius:10px;padding:10px 18px;text-align:center}
.hod-stat .v{font-size:22px;font-weight:900;color:#fff;font-family:'Syne',sans-serif}
.hod-stat .l{font-size:10px;color:#93c5fd;margin-top:2px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}

/* ── PROFILE ── */
.profile-header{border-left:4px solid;border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:16px}
.mp-tree{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.mp-tree-head{background:#f8fafc;padding:10px 16px;display:flex;align-items:center;gap:10px}
.cp-tree-row{padding:8px 16px 8px 40px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px}
.cp-tree-row:hover{background:#f8fafc}

/* ── UPLOAD ZONE ── */
.upload-zone{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1.5px dashed var(--border);border-radius:10px;cursor:pointer;transition:.15s;font-size:12px;font-weight:700;font-family:'Syne',sans-serif;color:var(--muted)}
.upload-zone:hover{border-color:var(--blue);color:var(--blue);background:#f0f9ff}
.upload-zone input{display:none}

/* ── SAMPLE FILE BANNER ── */
.sample-banner{background:linear-gradient(135deg,#f0f9ff,#eff6ff);border:1.5px solid #bae6fd;border-radius:12px;padding:14px 18px;margin-bottom:16px}
.sample-banner h4{font-size:12px;font-weight:800;color:#0369a1;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.sample-banner p{font-size:11px;color:#0c4a6e;line-height:1.6}
.sample-files{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.sample-link{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#fff;border:1px solid #93c5fd;border-radius:8px;font-size:11px;font-weight:700;color:#1d4ed8;text-decoration:none;transition:.15s}
.sample-link:hover{background:#dbeafe;border-color:#60a5fa}

/* ── FY CACHE CARDS ── */
.fy-cache-card{border:2px solid var(--border);border-radius:var(--radius);padding:16px;background:var(--surface);transition:.2s}
.fy-cache-card.active{border-color:var(--blue);background:#f0f9ff}
.fy-cache-card.locked{border-color:var(--amber);background:#fffbeb}

/* ── SECTION HEAD ── */
.section-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.section-head h2{font-size:16px;font-weight:900;color:var(--text);font-family:'Syne',sans-serif}
.section-head p{font-size:11px;color:var(--muted);margin-top:2px}

/* ── TOAST / SPINNER / MISC ── */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;pointer-events:none}
.toast-msg{background:#0f2540;color:#fff;padding:12px 20px;border-radius:10px;font-size:12px;font-weight:600;margin-top:8px;transform:translateX(120%);transition:.3s;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast-msg.show{transform:none}.toast-msg.success{background:#15803d}.toast-msg.error{background:#b91c1c}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.flex{display:flex}.flex-1{flex:1}.items-center{align-items:center}.items-start{align-items:flex-start}
.justify-between{justify-content:space-between}.gap-4{gap:4px}.gap-6{gap:6px}.gap-8{gap:8px}
.gap-12{gap:12px}.gap-16{gap:16px}.gap-20{gap:20px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-xxs{font-size:10px}
.text-muted{color:var(--muted)}.font-bold{font-weight:700}.font-black{font-weight:900;font-family:'Syne',sans-serif}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.italic{font-style:italic}
.hidden{display:none!important}
.org-node{background:#fff;border:2px solid var(--border);border-radius:12px;padding:12px 14px;min-width:176px;max-width:210px;cursor:pointer;transition:.2s;position:relative;display:inline-flex;flex-direction:column}
.org-node:hover{border-color:#60a5fa;box-shadow:0 4px 16px rgba(29,78,216,.12)}
.org-node.selected{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.15)}
.rollup-bar{height:6px;border-radius:6px;background:#e2e8f0;overflow:hidden;margin-top:4px}
.rollup-bar-fill{height:100%;border-radius:6px;transition:.6s}
.level-badge{display:inline-block;font-size:9px;font-weight:900;padding:2px 7px;border-radius:20px;font-family:'Syne',sans-serif;letter-spacing:.4px;text-transform:uppercase}
.level-1{background:#0f2540;color:#fff}.level-2{background:#1d4ed8;color:#fff}
.level-3{background:#6d28d9;color:#fff}.level-4{background:#047857;color:#fff}.level-5{background:#b45309;color:#fff}
.bs-date-picker{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.bs-date-picker select,.bs-date-picker input[type=number]{border:1.5px solid var(--border);border-radius:8px;padding:6px 8px;font-size:12px;background:#f8fafc;font-family:'DM Sans',sans-serif}
.bs-date-picker input[type=number]{width:58px;text-align:center}
.assign-card{border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:.15s;background:#fff;margin-bottom:6px}
.assign-card:hover{border-color:#60a5fa;background:#f0f9ff}
.assign-card.selected{border-color:var(--blue);background:#eff6ff}

.cascade-node{border-left:3px solid var(--border);padding-left:16px;margin-left:8px}
.cascade-role-box{background:linear-gradient(135deg,#0a1628,#0f2540);color:#fff;border-radius:12px;padding:12px 16px;margin-bottom:10px}
.cascade-mp-box{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;padding:10px 14px;margin-bottom:8px}
.cascade-cp-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:#fff;cursor:pointer;transition:.15s}
.cascade-cp-row:hover{border-color:#60a5fa;background:#f0f9ff}
.cascade-cp-row.linked{border-color:#16a34a;background:#f0fdf4}
.cascade-arrow{font-size:20px;color:#94a3b8;text-align:center;margin:4px 0}
.level-badge{display:inline-block;font-size:9px;font-weight:900;padding:2px 7px;border-radius:20px;font-family:'Syne',sans-serif;letter-spacing:.4px;text-transform:uppercase}
.level-1{background:#0f2540;color:#fff}
.level-2{background:#1d4ed8;color:#fff}
.level-3{background:#6d28d9;color:#fff}
.row-actions{display:flex;gap:6px;opacity:0;transition:.15s}
tbody tr:hover .row-actions{opacity:1}
.color-swatch{width:20px;height:20px;border-radius:50%;display:inline-block;vertical-align:middle;flex-shrink:0}
.kpi-bar{height:4px;border-radius:4px;background:#e2e8f0;overflow:hidden;margin-top:6px}
.kpi-bar-fill{height:100%;border-radius:4px;transition:.6s}
.info-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:12px 16px;margin-bottom:16px}
.info-box p{font-size:11px;color:#0c4a6e;line-height:1.6}
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div>
      <p style="font-size:10px;color:#93c5fd;font-weight:700;text-transform:uppercase;letter-spacing:1px">Sipradi Trading Pvt. Ltd.</p>
      <h1>SC-MPCP Control System</h1>
      <div id="header-meta">
        <span id="hdr-emps">— members</span>
        <span id="hdr-mps">— MPs</span>
        <span id="hdr-cps">— CPs</span>
        <span id="hdr-roles">— Roles</span>
        <span id="hdr-perf">— Records</span>
        <span class="fy-pill" id="hdr-fy">FY —</span>
        <span class="dot">● Saved</span>
      </div>
    </div>
    <div class="hdr-actions">
      <button class="hbtn" onclick="openCachePanel()">📦 FY Cache</button>
      <button class="hbtn" onclick="switchFY()">⇄ Switch FY</button>
    </div>
  </div>
  <div id="nav">
    <button class="nav-tab active" onclick="switchTab('dashboard')">📊 Dashboard</button>
    <button class="nav-tab" onclick="switchTab('team')">👥 Team</button>
    <button class="nav-tab" onclick="switchTab('master')">🔧 Master Setup</button>
    <button class="nav-tab" onclick="switchTab('data')">📁 Data Manager</button>
    <button class="nav-tab" onclick="switchTab('reports')">📈 Reports</button>
      <button class="nav-tab" onclick="switchTab('org')">&#127970; Org &amp; Cascade</button>
  </div>
</div>

<div id="app">
  <div id="tab-dashboard" class="tab-panel active"><div class="spinner"></div></div>
  <div id="tab-team" class="tab-panel">
    <div class="section-head">
      <div><h2>Team & Hierarchy</h2><p id="team-sub"></p></div>
      <div class="flex gap-8">
        <button class="btn btn-ghost btn-sm" onclick="setTeamView('cards')">⊞ Cards</button>
        <button class="btn btn-ghost btn-sm" onclick="setTeamView('org')">⑂ Org Chart</button>
        <button class="btn btn-ghost btn-sm" id="emp-bulk-toggle" onclick="toggleEmpBulk()" style="display:none">☑ Select</button>
        <button class="btn btn-sm" id="emp-bulk-delete-btn" onclick="bulkDeleteEmps()" style="display:none;background:#fee2e2;color:#b91c1c">🗑 Delete Selected (<span id="emp-bulk-count">0</span>)</button>
        <button class="btn btn-primary btn-sm" onclick="openEmpForm()">+ Add Member</button>
      </div>
    </div>
    <div id="team-content"><div class="spinner"></div></div>
  </div>
  <div id="tab-master" class="tab-panel">
    <div class="sub-tabs" id="master-tabs">
      <button class="sub-tab active" onclick="switchMaster('mps')">Managing Points</button>
      <button class="sub-tab" onclick="switchMaster('cps')">Checking Points</button>
      <button class="sub-tab" onclick="switchMaster('roles')">Role Templates</button>
      <button class="sub-tab" onclick="switchMaster('links')">Role Assignments</button>
			<button class="sub-tab" onclick="switchMaster('locations')">&#128205; Locations</button>
      <button class="sub-tab" onclick="switchMaster('dashboard_builder')">&#128196; Dashboard Builder</button>
    </div>
    <div id="master-content"><div class="spinner"></div></div>
  </div>
  <div id="tab-data" class="tab-panel">
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="switchData('perf')">Performance Records</button>
      <button class="sub-tab" onclick="switchData('cache')">FY Cache Manager</button>
      <button class="sub-tab" onclick="switchData('bulk')">🗑 Bulk Delete</button>
    </div>
    <div id="data-content"><div class="spinner"></div></div>
  </div>
  <div id="tab-reports" class="tab-panel">
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="switchReport('overview')">📊 Overview</button>
      <button class="sub-tab" onclick="switchReport('yoy')">📅 Year-on-Year</button>
      <button class="sub-tab" onclick="switchReport('employee')">👤 Employee-wise</button>
      <button class="sub-tab" onclick="switchReport('mpcp')">🎯 MP / CP Drill-down</button>
			<button class="sub-tab" onclick="switchReport('location')">&#128205; By Location</button>
    </div>
    <div id="report-content"><div class="spinner"></div></div>
  </div>
  <div id="tab-org" class="tab-panel">
    <div class="sub-tabs" id="org-tabs">
      <button class="sub-tab active" onclick="switchOrg('tree')">Live Org Tree</button>
      <button class="sub-tab" onclick="switchOrg('builder')">Cascade Builder</button>
      <button class="sub-tab" onclick="switchOrg('assign')">Assign MP/CP</button>
    </div>
    <div id="org-content"><div class="spinner"></div></div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-head">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
const S = {
  employees:[], mps:[], cps:[], roles:[], perf:[], cache:[], cascade:[], bsToday:{}, dashLayouts:[], sectors:[],
  locations:[], currentTab:'dashboard', teamView:'cards', masterSub:'mps',
  dataSub:'perf', reportSub:'overview', currentFY:'2081-82'
}
const DC = { HOD:'#0f2540',Vehicle:'#1d4ed8',Registration:'#6d28d9',Warehouse:'#047857',Stock:'#b45309',Ops:'#475569',Finance:'#0e7490',HR:'#be185d' }
const BS_MONTHS = ['Shrawan','Bhadra','Ashwin','Kartik','Mangsir','Poush','Magh','Falgun','Chaitra','Baisakh','Jestha','Ashadh']
const BS_Q = {Shrawan:'Q1',Bhadra:'Q1',Ashwin:'Q1',Kartik:'Q2',Mangsir:'Q2',Poush:'Q2',Magh:'Q3',Falgun:'Q3',Chaitra:'Q3',Baisakh:'Q4',Jestha:'Q4',Ashadh:'Q4'}
let charts = {}

// ── API ──────────────────────────────────────────────────────────────────────
const api = {
  _json: async r => {
    const ct = r.headers.get('content-type') || ''
    if (!ct.includes('application/json')) {
      const txt = await r.text()
      throw new Error('Server HTTP ' + r.status + ' (non-JSON) — check Flask terminal')
    }
    const j = await r.json()
    if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status))
    return j
  },
  get:  url     => fetch(url).then(r => api._json(r)),
  post: (url,d) => fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r => api._json(r)),
  put:  (url,d) => fetch(url,{method:'PUT', headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r => api._json(r)),
  del:  url     => fetch(url,{method:'DELETE'}).then(r => api._json(r)),
}

async function safeGet(url, fallback=[]) {
  try { const r = await fetch(url); if (!r.ok) return fallback; return await r.json() }
  catch(e) { return fallback }
}

async function loadAll() {
  const [e,m,c,r,p,ca,locs,casc,bst,layouts,sects] = await Promise.all([
    safeGet('/api/employees',[]), safeGet('/api/mps',[]), safeGet('/api/cps',[]),
    safeGet('/api/roles',[]), safeGet('/api/perf',[]), safeGet('/api/cache',[]),
    safeGet('/api/locations',[]),
    safeGet('/api/cascade',[]),
    safeGet('/api/bs_today',{}),
    safeGet('/api/dashboard_layouts?user=default',[]),
    safeGet('/api/sectors',[])
  ])
  S.employees=e||[]; S.mps=m||[]; S.cps=c||[]; S.roles=r||[]; S.perf=p||[]; S.cache=ca||[];
  S.locations=locs||[]; S.cascade=casc||[]; S.bsToday=bst||{}; S.dashLayouts=layouts||[]; S.sectors=sects||[]
  // Set currentFY from most recent active cache
  const latest = (ca||[]).sort((a,b)=>b.fy.localeCompare(a.fy))[0]
  if (latest && !(S.cache||[]).find(x=>x.fy===S.currentFY)) S.currentFY = latest.fy
  updateHeader(); renderCurrent()
}

function updateHeader() {
  $('hdr-emps').textContent = S.employees.length+' members'
  $('hdr-mps').textContent  = S.mps.length+' MPs'
  $('hdr-cps').textContent  = S.cps.length+' CPs'
  $('hdr-roles').textContent= S.roles.length+' Roles'
  $('hdr-perf').textContent = S.perf.length+' Records'
  $('hdr-fy').textContent   = 'FY '+S.currentFY
}

// ── UTILS ────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id)
const q = sel => document.querySelector(sel)
const qq = sel => [...document.querySelectorAll(sel)]
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
const dc = d => {
  if(S.sectors&&S.sectors.length){const s=S.sectors.find(x=>x.name===d);if(s)return s.color}
  return DC[d]||'#475569'
}
const av = n => (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()
const pc = p => p==null?'#94a3b8':p>=95?'#16a34a':p>=80?'#d97706':'#dc2626'

function pctBadge(p) {
  if (p==null) return '<span class="text-muted text-xs">—</span>'
  const cls = p>=95?'pct-green':p>=80?'pct-amber':'pct-red'
  return `<span class="badge badge-${cls}">${p}%</span>`
}
function statusBadge(s) { return s==='C'?'<span class="badge badge-c">✓ C</span>':'<span class="badge badge-nc">✗ NC</span>' }
function deptBadge(d) { return `<span class="dept-badge" style="background:${dc(d)}">${d}</span>` }
function ownerChips(ids) { return (ids||[]).map(id=>{const e=getEmp(id);if(!e)return '';return `<span class="owner-chip" style="background:${dc(e.dept)}" onclick="openProfile('${e.id}',event)">${e.name.split(' ')[0]}</span>`}).join('') }
function getEmp(id) { return S.employees.find(e=>e.id===id) }
function getEmpByCode(code) { return S.employees.find(e=>e.emp_code===code) }
function getMP(id) { return S.mps.find(m=>m.id===id) }
function getMPByRef(ref) { return S.mps.find(m=>m.ref===ref) }
function getCP(id) { return S.cps.find(c=>c.id===id) }
function getRole(id) { return S.roles.find(r=>r.id===id) }
function perfByFY(fy) { return S.perf.filter(p=>p.fy===fy) }

function complianceSummary(records) {
  const tot = records.reduce((s,r)=>s+(r.total||1),0)
  const comp = records.reduce((s,r)=>s+(r.compliant||(r.status==='C'?1:0)),0)
  const nc = records.reduce((s,r)=>s+(r.non_compliant||(r.status==='NC'?1:0)),0)
  const pct_c = tot ? +(comp/tot*100).toFixed(2) : 0
  const pct_nc = tot ? +(nc/tot*100).toFixed(2) : 0
  return {tot,comp,nc,pct_c,pct_nc}
}

function compCard({ref,title,tot,comp,nc,pct_c,pct_nc,color}) {
  const c = color||pc(pct_c)
  const barC = Math.min(pct_c,100)+'%'
  return `<div class="compliance-card">
    <div class="cc-title">
      ${ref?`<span class="cc-ref">${esc(ref)}</span>`:''}
      <span class="truncate flex-1">${esc(title)}</span>
      <span class="cc-pct" style="color:${c}">${(pct_c||0).toFixed(2)}%</span>
    </div>
    <div class="cc-bar">
      <span class="cc-bar-c" style="width:${barC};background:${c}"></span>
    </div>
    <div class="cc-nums">
      <span class="cc-total">Total: <strong>${(tot||0).toLocaleString()}</strong></span>
      <span class="cc-c">✓ ${(comp||0).toLocaleString()} &nbsp;(${(pct_c||0).toFixed(2)}%)</span>
      <span class="cc-nc">✗ ${(nc||0).toLocaleString()} &nbsp;(${(pct_nc||0).toFixed(2)}%)</span>
    </div>
  </div>`
}

function toast(msg, type='') {
  const el = document.createElement('div')
  el.className = 'toast-msg '+(type==='ok'?'success':type==='err'?'error':type)
  el.textContent = msg
  $('toast').appendChild(el)
  requestAnimationFrame(()=>el.classList.add('show'))
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300)},3500)
}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id]}}
function setSpinner(elId){$(elId).innerHTML='<div class="spinner"></div>'}

// ── TAB ROUTING ──────────────────────────────────────────────────────────────
function switchTab(t) {
  S.currentTab=t
  qq('.tab-panel').forEach(el=>el.classList.remove('active'))
  qq('.nav-tab').forEach(el=>el.classList.remove('active'))
  q(`#tab-${t}`).classList.add('active')
  qq('.nav-tab').find(el=>el.textContent.toLowerCase().includes(t.slice(0,4)))?.classList.add('active')
  renderCurrent()
}
function renderCurrent() {
  if(S.currentTab==='dashboard') renderDashboard()
  else if(S.currentTab==='team') renderTeam()
  else if(S.currentTab==='master') renderMaster()
  else if(S.currentTab==='data') renderData()
  else if(S.currentTab==='reports') renderReport()
  else if(S.currentTab==='org') renderOrgTab()
}
function switchMaster(s) { S.masterSub=s; qq('#master-tabs .sub-tab').forEach(t=>t.classList.remove('active')); event.target.classList.add('active'); renderMaster() }
function switchData(s) { S.dataSub=s; qq('#tab-data .sub-tab').forEach(t=>t.classList.remove('active')); event.target.classList.add('active'); renderData() }
function switchReport(s) { S.reportSub=s; qq('#tab-reports .sub-tab').forEach(t=>t.classList.remove('active')); event.target.classList.add('active'); renderReport() }
function setTeamView(v) { S.teamView=v; renderTeam() }

function switchFY() {
  const fys = S.cache.map(c=>c.fy).sort((a,b)=>b.localeCompare(a))
  if(!fys.length){toast('No FY cache configured','error');return}
  const html = `<div class="form-group"><label class="form-label">Select Active Fiscal Year</label>
    <select class="form-select" id="fy-select">
      ${fys.map(f=>`<option value="${f}" ${f===S.currentFY?'selected':''}>${f}${f===S.currentFY?' (current)':''}</option>`).join('')}
    </select></div>
    <p class="text-xs text-muted mt-8">Dashboard and reports will show data for the selected FY.</p>`
  openModal('Switch Active Fiscal Year', html, [{label:'Switch',cls:'btn-primary',fn:()=>{S.currentFY=q('#fy-select').value;updateHeader();closeModal();renderCurrent();toast('FY switched to '+S.currentFY,'ok')}}])
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(title, body, actions=[], wide=false) {
  q('#modal-title').textContent = title
  q('#modal-body').innerHTML = body
  q('#modal-box').className = 'modal'+(wide?' wide':'')
  const ft = q('#modal-foot'); ft.innerHTML = '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'
  actions.forEach(a=>{const b=document.createElement('button');b.className='btn '+(a.cls||'btn-primary');b.textContent=a.label;b.onclick=a.fn;ft.appendChild(b)})
  q('#modal-overlay').classList.remove('hidden')
}
function closeModal(e){if(e&&e.target!==e.currentTarget)return;q('#modal-overlay').classList.add('hidden')}

// Re-label the first checked item as "Primary" when selections change
function markPrimary(pid) {
  const checked = document.querySelectorAll(`#${pid} input:checked`)
  document.querySelectorAll(`#${pid} .badge-c`).forEach(b=>b.remove())
  if (checked.length) {
    const label = document.createElement('span')
    label.className = 'badge badge-c text-xxs'
    label.textContent = 'Primary'
    checked[0].closest('.owner-item').appendChild(label)
  }
}

  const et = q('#emp-bulk-toggle'); if (et) et.style.display = 'inline-flex'

  if (S.teamView==='org') { renderOrgChart(); return }

  let html = ''
  for (let lvl=1;lvl<=3;lvl++) {
    const emps = S.employees.filter(e=>e.level===lvl)
    if (!emps.length) continue
    const label = ['','Level 1 — Head of Department','Level 2 — Team Leads & Supervisors','Level 3 — Operations & Execution'][lvl]
    html += `<p class="text-xxs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;${lvl>1?'margin-top:18px;':''}padding-bottom:6px;border-bottom:1px solid var(--border)">${label}</p>`

      const mgr=getEmp(emp.manager_id)
      const myMPs=S.mps.filter(m=>(m.owner_ids||[]).includes(emp.id)).length
      const myCPs=S.cps.filter(c=>(c.owner_ids||[]).includes(emp.id)).length
      const eroles=(emp.role_ids||[]).map(getRole).filter(Boolean)
      const empCardColor = emp.sector_ids&&emp.sector_ids.length
        ? (S.sectors.find(s=>s.id===emp.sector_ids[0])?.color||dc(emp.dept))
        : dc(emp.dept)
      html += `<div class="card" style="padding:14px;border-left:3px solid ${empCardColor}">
        <div class="flex gap-12">
          <div class="avatar avatar-md" style="background:${dc(emp.dept)}">${av(emp.name)}</div>
          <div class="flex-1" style="min-width:0">

            <p class="text-xs text-muted truncate">${esc(emp.role)}</p>

            ${mgr?`<p class="text-xxs text-muted mt-4">↑ ${esc(mgr.name.split(' ')[0])}</p>`:''}
            <div class="flex gap-4 mt-8" style="flex-wrap:wrap">
              ${deptBadge(emp.dept)}

              <span class="badge badge-gray">${myCPs} CPs</span>
            </div>
            ${eroles.length?`<div class="flex gap-4 mt-6" style="flex-wrap:wrap">${eroles.map(r=>`<span class="badge" style="background:${r.color};color:#fff">${esc(r.code)}</span>`).join('')}</div>`:''}
          </div>
        </div>

          <button class="btn btn-ghost btn-sm flex-1" onclick="openEmpForm('${emp.id}')">Edit</button>

      const loc_ids      = getLocationPicked('ef-locations')

}

function renderBulkDelete() {
  const fys   = [...new Set(S.perf.map(p=>p.fy))].sort((a,b)=>b.localeCompare(a))
  const months = BS_MONTHS
  const emps  = S.employees
  const mps   = S.mps
  const cps   = S.cps

  const fyOpts  = fys.map(f=>`<option value="${f}">${f}</option>`).join('')
  const moOpts  = months.map(m=>`<option value="${m}">${m}</option>`).join('')
  const empOpts = emps.map(e=>`<option value="${esc(e.emp_code||'')}">` +
    `${esc(e.name)} (${esc(e.emp_code||'')})</option>`).join('')
  const mpOpts  = mps.map(m=>`<option value="${esc(m.ref)}">${esc(m.ref)} — ${esc(m.title.slice(0,40))}</option>`).join('')
  const cpOpts  = cps.map(c=>`<option value="${esc(c.ref)}">${esc(c.ref)} — ${esc(c.title.slice(0,40))}</option>`).join('')

  const fyStats = {}
  S.perf.forEach(p=>{ fyStats[p.fy]=(fyStats[p.fy]||0)+1 })
  const cacheMap = {}

  fys.forEach(fy => {
    const cache = cacheMap[fy]

    const cnt = fyStats[fy] || 0
    const col = locked ? '#b45309' : cnt > 0 ? '#dc2626' : '#16a34a'
    html += `<tr>

          onclick="wipeEntireFY('${fy}',${cnt})">🗑 Wipe FY</button>`}
      </div></td>
    </tr>`
  })

  html += `</tbody></table></div></div></div>

    <div class="card">
      <div class="card-head"><p>🎯 Selective Delete — Filter & Delete</p></div>
      <div class="card-body">
        <p class="text-xs text-muted mb-12">Set filters, preview matching records, then delete.</p>

              <option value="">All Employees</option>${empOpts}

async function bdPreview() {
  const fy=q('#bd-fy')?.value||'', month=q('#bd-month')?.value||''
  const emp=q('#bd-emp')?.value||'', mp=q('#bd-mp')?.value||'', cp=q('#bd-cp')?.value||''
  const box=q('#bd-preview-box'), btn=q('#bd-delete-btn')
  if(!fy){
    box.innerHTML='<p class="text-sm text-muted italic">Select a Fiscal Year to preview.</p>'
    btn.style.opacity='0.4';btn.style.pointerEvents='none';return
  }
  box.innerHTML='<div class="spinner" style="margin:10px auto"></div>'
  try{
    const res=await api.post('/api/perf/bulk_delete',{fy,month,emp_code:emp,mp_ref:mp,cp_ref:cp,preview:true})
    const cnt=res.count||0
    const matched=S.perf.filter(p=>(!fy||p.fy===fy)&&(!month||p.bs_month===month)&&(!emp||p.emp_code===emp)&&(!mp||p.mp_ref===mp)&&(!cp||p.cp_ref===cp))
    const col=cnt===0?'#16a34a':'#dc2626'
    box.innerHTML=`<div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:32px;font-weight:900;font-family:'Syne',sans-serif;color:${col}">${cnt}</span>
      <div><p class="font-bold">${cnt===0?'No records match these filters':'records will be permanently deleted'}</p>
      <p class="text-xs text-muted">FY:${fy}${month?' · '+month:''}${emp?' · '+emp:''}${mp?' · '+mp:''}${cp?' · '+cp:''}</p></div>
      ${cnt>0?`<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="bdShowTable()">View ↓</button>`:''}
    </div>`
    const tbody=q('#bd-table-body')
    if(tbody) tbody.innerHTML=matched.slice(0,100).map(p=>`<tr>
      <td class="font-bold">${p.fy}</td><td>${esc(p.bs_month)}</td>
      <td><span class="emp-code">${esc(p.emp_code||'—')}</span></td>
      <td><span class="ref-badge">${esc(p.mp_ref)}</span></td>
      <td><span class="ref-badge ref-badge-blue">${esc(p.cp_ref)}</span></td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.metric)}</td>
      <td style="text-align:right;font-weight:700">${(p.total||0).toLocaleString()}</td>
      <td>${statusBadge(p.status)}</td></tr>`).join('')
    if(q('#bd-table-title'))q('#bd-table-title').textContent=`Matching Records — ${matched.length}${matched.length>100?' (showing 100)':''}`
    btn.style.opacity=cnt>0?'1':'0.4';btn.style.pointerEvents=cnt>0?'auto':'none'
  }catch(e){box.innerHTML=`<p style="color:var(--red)">Error:${e.message}</p>`}
}

function bdShowTable(){const w=q('#bd-table-wrap');if(w){w.style.display='';w.scrollIntoView({behavior:'smooth'})}}
function bdReset(){
  ['bd-fy','bd-month','bd-emp','bd-mp','bd-cp'].forEach(id=>{const el=q('#'+id);if(el)el.value=''})
  const box=q('#bd-preview-box');if(box)box.innerHTML='<p class="text-sm text-muted italic">Select a Fiscal Year to preview.</p>'
  const btn=q('#bd-delete-btn');if(btn){btn.style.opacity='0.4';btn.style.pointerEvents='none'}
  const w=q('#bd-table-wrap');if(w)w.style.display='none'
}

async function bdConfirmDelete(){
  const fy=q('#bd-fy')?.value||'',month=q('#bd-month')?.value||''
  const emp=q('#bd-emp')?.value||'',mp=q('#bd-mp')?.value||'',cp=q('#bd-cp')?.value||''
  if(!fy){toast('Select a FY first','error');return}
  let msg=`Delete performance records for FY ${fy}`
  if(month)msg+=`, Month:${month}`;if(emp)msg+=`, Emp:${emp}`
  if(mp)msg+=`, MP:${mp}`;if(cp)msg+=`, CP:${cp}`
  if(!confirm(msg+'\n\nThis cannot be undone. Export first if needed.'))return
  const btn=q('#bd-delete-btn');if(btn){btn.disabled=true;btn.textContent='Deleting...'}
  try{
    const res=await api.post('/api/perf/bulk_delete',{fy,month,emp_code:emp,mp_ref:mp,cp_ref:cp,preview:false})
    if(res.deleted!==undefined){
      toast(`Deleted ${res.deleted} records from FY ${fy} ✓`,'ok')
      await loadAll();renderBulkDelete()
    }else{
      toast('Error:'+(res.error||'Unknown'),'error')
      if(btn){btn.disabled=false;btn.textContent='🗑 Delete Matching'}
    }
  }catch(e){toast('Error:'+e.message,'error');if(btn){btn.disabled=false;btn.textContent='🗑 Delete Matching'}}
}

async function wipeEntireFY(fy,cnt){
  if(!confirm(`Wipe ALL ${cnt} performance records for FY ${fy}?\n\nMPs and CPs will be kept. This cannot be undone.`))return
  const res=await api.post('/api/perf/bulk_delete_fy',{fy})
  if(res.deleted!==undefined){toast(`Wiped ${res.deleted} records from FY ${fy} ✓`,'ok');await loadAll();renderBulkDelete()}
  else toast('Error:'+(res.error||'Unknown'),'error')
}

      </div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="pf-notes-in" value="${esc(rec?.notes||'')}"></div>`,
    [{label:rec?'Save Changes':'Add Record',cls:'btn-primary',fn:async()=>{
      const ec=q('#pf-emp-in').value
      const tot=+q('#pf-tot-in').value, comp=+q('#pf-c-in').value, nc=+q('#pf-nc-in').value
      const selEmp2 = S.employees.find(e=>e.emp_code===ec||e.id===ec)
      const autoSec2 = selEmp2 && selEmp2.sector_ids && selEmp2.sector_ids.length
        ? (S.sectors.find(s=>s.id===selEmp2.sector_ids[0])?.code||selEmp2.dept||'')
        : (selEmp2?.dept||'')
      const autoLoc2 = selEmp2 && selEmp2.loc_ids && selEmp2.loc_ids.length
        ? ((S.locations||[]).find(l=>l.id===selEmp2.loc_ids[0])?.code||'')
        : ''
      const d={fy:q('#pf-fy-in').value, bs_month:q('#pf-mo-in').value,
        emp_code:ec, mp_ref:q('#pf-mp-in').value, cp_ref:q('#pf-cp-in').value,
        metric:q('#pf-metric-in').value, total:tot, compliant:comp, non_compliant:nc,
        target_val:+q('#pf-tgt-in').value, actual_val:+q('#pf-act-in').value,
        unit:q('#pf-unit-in').value, notes:q('#pf-notes-in').value,
        sector_code:  q('#pf-sec-in')?.value  || autoSec2,
        location_code:q('#pf-loc-in')?.value  || autoLoc2}
      if(!d.emp_code){toast('Select employee','error');return}
      if(rec){d.id=rec.id;await api.put(`/api/perf/${rec.id}`,d)}
      else await api.post('/api/perf',d)
      toast(rec?'Updated':'Added','ok');closeModal();await loadAll()
    }}],true
  )
  if(!rec){autoQ();autoCalcPct()}
}
function autoQ(){const m=q('#pf-mo-in')?.value;if(m&&q('#pf-q-in'))q('#pf-q-in').value=BS_Q[m]||'Q1'}
function autoCalcPct(){
  const tot=+q('#pf-tot-in')?.value||0, comp=+q('#pf-c-in')?.value||0, nc=+q('#pf-nc-in')?.value||0
  const pctC=tot?+(comp/tot*100).toFixed(2):0, pctNC=tot?+(nc/tot*100).toFixed(2):0
  const cp=q('#pct-c-preview'), cn=q('#pct-nc-preview')
  if(cp)cp.textContent=pctC+'%'; if(cn)cn.textContent=pctNC+'%'
}
async function delPerf(id){if(!confirm('Delete this record?'))return;await api.del(`/api/perf/${id}`);toast('Deleted');await loadAll()}
async function uploadPerf(input){
  const fd=new FormData();fd.append('file',input.files[0])
  const msg=q('#upload-msg');msg.className='mb-16';msg.style.cssText='padding:12px 16px;border-radius:10px;font-size:12px;font-weight:600;background:#dbeafe;color:#1e40af;margin-bottom:16px'
  msg.textContent='Uploading…'
  const r=await fetch('/api/perf/import',{method:'POST',body:fd}).then(r=>r.json())
  if(r.imported!=null){
    msg.style.background='#dcfce7';msg.style.color='#15803d'
    msg.textContent=`✅ Imported ${r.imported} records successfully`
  } else {
    msg.style.background='#fee2e2';msg.style.color='#b91c1c'
    msg.textContent=`❌ Import failed: ${r.error||'Unknown error'}`
  }
  setTimeout(()=>msg.className='mb-16 hidden',5000)
  await loadAll();input.value=''
}

// ── FY CACHE MANAGER ─────────────────────────────────────────────────────────
function renderCacheManager(){
  let html=`
  <div class="sample-banner">
    <h4>📦 Fiscal Year Data Cache</h4>
    <p>Each Nepali fiscal year (e.g. 2081-82) is a separate data profile. You can clear and re-upload data for any FY independently.
    Lock a FY to prevent accidental changes. Historical data remains available for year-on-year comparison at any time.</p>
  </div>
  <div class="section-head">
    <div><h2>FY Cache Manager</h2><p>${S.cache.length} fiscal years registered</p></div>
    <button class="btn btn-primary btn-sm" onclick="openNewFY()">+ Create FY Profile</button>
  </div>
  <div class="grid-3">`

  S.cache.sort((a,b)=>b.fy.localeCompare(a.fy)).forEach(c=>{
    const isCurrent=c.fy===S.currentFY
    const locked=!!c.locked
    html+=`<div class="fy-cache-card ${isCurrent?'active':''} ${locked?'locked':''}">
      <div class="flex items-start justify-between mb-12">
        <div>
          <p class="font-black" style="font-size:18px;color:${isCurrent?'var(--blue)':'var(--text)'}">FY ${esc(c.fy)}</p>
          <p class="text-xs text-muted">${esc(c.label)}</p>
        </div>
        <div class="flex gap-4">
          ${locked?'<span class="badge badge-amber">🔒 Locked</span>':''}
          ${isCurrent?'<span class="badge badge-blue">Active</span>':''}
        </div>
      </div>
      <div class="flex gap-12 mb-12">
        <div class="stat-box flex-1" style="padding:10px"><div class="val" style="font-size:20px;color:var(--blue)">${c.record_count}</div><div class="lbl">Records</div></div>
        ${(()=>{const p=perfByFY(c.fy);const {tot,comp,nc,pct_c}=complianceSummary(p);return tot>0?`<div class="stat-box flex-1" style="padding:10px"><div class="val" style="font-size:20px;color:${pc(pct_c)}">${pct_c}%</div><div class="lbl">Compliance</div></div>`:''})()}
      </div>
      ${c.updated_at?`<p class="text-xxs text-muted mb-12">Updated: ${new Date(c.updated_at).toLocaleDateString()}</p>`:''}
      <div class="flex gap-6" style="flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm flex-1" onclick="S.currentFY='${c.fy}';updateHeader();renderCurrent();toast('Switched to FY ${c.fy}','ok')">
          ${isCurrent?'✓ Current':'Switch to'}
        </button>
        <button class="btn btn-sm ${locked?'btn-amber':'btn-ghost'}" onclick="toggleFYLock('${c.fy}')">
          ${locked?'🔓 Unlock':'🔒 Lock'}
        </button>
        ${!locked?`<button class="btn btn-ghost btn-sm" onclick="clearFY('${c.fy}')">Clear Data</button>
        <button class="btn btn-sm" style="background:#fee2e2;color:#b91c1c" onclick="deleteFY('${c.fy}')">Delete</button>`:''}
      </div>
    </div>`
  })
  html+='</div>'
  q('#data-content').innerHTML=html
}
function openNewFY(){
  openModal('Create New FY Cache Profile',`
    <div class="form-group"><label class="form-label">Fiscal Year (BS)</label>
      <input class="form-input" id="new-fy" placeholder="e.g. 2082-83">
      <p class="text-xs text-muted mt-8">Format: 4-digit BS year followed by next year e.g. 2082-83 for Shrawan 2082 – Ashadh 2083</p>
    </div>
    <div class="form-group"><label class="form-label">Label (optional)</label>
      <input class="form-input" id="new-fy-label" placeholder="e.g. FY 2082-83 (2025-26)"></div>`,
    [{label:'Create FY Profile',cls:'btn-primary',fn:async()=>{
      const fy=q('#new-fy').value.trim()
      if(!fy){toast('FY required','error');return}
      const label=q('#new-fy-label').value||`FY ${fy}`
      await api.post('/api/cache',{fy,label})
      toast(`FY ${fy} profile created`,'ok');closeModal();await loadAll()
    }}]
  )
}
function openCachePanel(){switchTab('data');S.dataSub='cache';qq('#tab-data .sub-tab').forEach((t,i)=>{t.classList.toggle('active',i===1)});renderData()}
async function toggleFYLock(fy){
  const r=await api.post(`/api/cache/${encodeURIComponent(fy)}/lock`,{})
  toast(r.locked?`FY ${fy} locked`:`FY ${fy} unlocked`,'ok');await loadAll()
}
async function clearFY(fy){
  if(!confirm(`Clear ALL performance data for FY ${fy}? The FY profile stays. You can re-upload data.`))return
  await api.post(`/api/cache/${encodeURIComponent(fy)}/clear`,{})
  toast(`FY ${fy} data cleared`,'ok');await loadAll()
}
async function deleteFY(fy){
  if(!confirm(`Delete FY ${fy} profile AND all its data permanently?`))return
  await api.del(`/api/cache/${encodeURIComponent(fy)}`)
  if(S.currentFY===fy&&S.cache.length>0)S.currentFY=S.cache[0]?.fy||''
  toast(`FY ${fy} deleted`,'ok');await loadAll()
}

// ── REPORTS ──────────────────────────────────────────────────────────────────
async function renderReport(){
  if(S.reportSub==='location'){ renderLocationReport(); return }
  if(S.reportSub==='overview') renderOverviewReport()
  else if(S.reportSub==='yoy') await renderYoYReport()
  else if(S.reportSub==='employee') renderEmpReport()
  else renderMPCPReport()
}

function renderOverviewReport(){
  const fyPerf=perfByFY(S.currentFY)
  const years=[...new Set(S.cache.map(c=>c.fy))].sort((a,b)=>b.localeCompare(a))

  // Per-MP compliance cards
  const mpCards=S.mps.map(mp=>{
    const rows=fyPerf.filter(p=>p.mp_ref===mp.ref)
    const {tot,comp,nc,pct_c,pct_nc}=complianceSummary(rows)
    if(!tot)return null
    return {ref:mp.ref,title:mp.title,tot,comp,nc,pct_c,pct_nc}
  }).filter(Boolean)

  // Monthly breakdown
  const monthData=BS_MONTHS.map(m=>{
    const rows=fyPerf.filter(p=>p.bs_month===m)
    if(!rows.length)return null

    return {month:m,tot,comp,nc,pct:pct_c}

  let html=`
  <div class="flex gap-8 items-center mb-20">

    </select>
  </div>`

  const {tot,comp,nc,pct_c,pct_nc}=complianceSummary(fyPerf)
  html+=`<div class="mb-16">${compCard({title:'FY '+S.currentFY+' — Overall Performance',tot,comp,nc,pct_c,pct_nc})}</div>`

  if(monthData.length){
    html+=`<div class="card mb-20">
      <div class="card-head"><p>Monthly Compliance Trend — FY ${S.currentFY} (BS Calendar)</p></div>
      <div class="card-body"><canvas id="rep-trend-chart" height="100"></canvas></div>
    </div>`
  }

  html+=`<div class="card mb-20">
    <div class="card-head"><p>MP-wise Compliance Summary — FY ${S.currentFY}</p></div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">
        ${mpCards.map(m=>compCard(m)).join('')}
        ${!mpCards.length?'<p class="text-sm text-muted italic">No performance data for this FY. Upload records in Data Manager.</p>':''}
      </div>
    </div>
  </div>`

  // Full table
  html+=`<div class="card">
    <div class="card-head"><p>MP Compliance Table</p></div>
    <div class="card-body"><div class="tbl-wrap"><table>
      <thead><tr><th>MP Ref</th><th>Managing Point</th><th>Total</th><th>✓ Compliant</th><th>% C</th><th>✗ NC</th><th>% NC</th><th>KPI Rate</th></tr></thead>
      <tbody>${S.mps.map(mp=>{
        const rows=fyPerf.filter(p=>p.mp_ref===mp.ref)
        const {tot:mt,comp:mc,nc:mn,pct_c:mpc,pct_nc:mpnc}=complianceSummary(rows)
        return `<tr>
          <td><span class="ref-badge">${esc(mp.ref)}</span></td>
          <td style="max-width:260px">${esc(mp.title.slice(0,60))}</td>
          <td style="text-align:right;font-weight:700">${mt>0?mt.toLocaleString():'—'}</td>
          <td style="text-align:right;color:var(--green);font-weight:700">${mc>0?mc.toLocaleString():'—'}</td>
          <td style="text-align:right"><span style="font-weight:900;color:${pc(mpc)};font-family:'Syne',sans-serif">${mt>0?mpc+'%':'—'}</span></td>
          <td style="text-align:right;color:var(--red)">${mn>0?mn.toLocaleString():'—'}</td>
          <td style="text-align:right;color:var(--red)">${mn>0?mpnc+'%':'—'}</td>
          <td>${mp.pct!=null?`<span class="badge ${mp.pct>=95?'badge-pct-green':mp.pct>=80?'badge-pct-amber':'badge-pct-red'}">${mp.pct}%</span>`:'—'}</td>
        </tr>`}).join('')}

  q('#report-content').innerHTML=html

          {label:'Compliant',data:monthData.map(d=>d.comp),borderColor:'#16a34a',backgroundColor:'#16a34a20',fill:true,tension:.3},

    <div class="stat-box"><div class="val" style="color:var(--violet)">${(dA.total||0)} → ${(dB.total||0)}</div><div class="lbl">Volume Change</div></div>

  <div class="grid-2 mb-20">
    <div class="card"><div class="card-head"><p>Monthly Trend: ${yA} vs ${yB}</p></div><div class="card-body"><canvas id="yoy-trend" height="140"></canvas></div></div>

        <th style="text-align:right">Change</th>

function renderEmpReport(){

    const ec=emp.emp_code
    const rows=fyPerf.filter(p=>p.emp_code===ec||p.emp_id===emp.id)
    if(!rows.length)return null
    const {tot,comp,nc,pct_c,pct_nc}=complianceSummary(rows)
    const byMP=[...new Set(rows.map(r=>r.mp_ref))].filter(Boolean).map(ref=>{
      const mr=rows.filter(r=>r.mp_ref===ref)
      const {tot:mt,comp:mc,nc:mn,pct_c:mpc,pct_nc:mpnc}=complianceSummary(mr)
      return {ref,tot:mt,comp:mc,nc:mn,pct_c:mpc,pct_nc:mpnc}
    })
    return {...emp,tot,comp,nc,pct_c,pct_nc,byMP}
  }).filter(Boolean).sort((a,b)=>(b.pct_c||0)-(a.pct_c||0))

  const years=[...new Set(S.cache.map(c=>c.fy))].sort((a,b)=>b.localeCompare(a))

  let html=`<div class="flex gap-8 items-center mb-20">
    <span class="font-bold text-sm">FY:</span>
    <select class="form-select" id="emp-fy" style="width:120px" onchange="S.currentFY=this.value;updateHeader();renderReport()">
      ${years.map(y=>`<option ${y===S.currentFY?'selected':''}>${y}</option>`).join('')}
    </select>
  </div>`

  if(!empStats.length){html+='<p class="text-sm text-muted italic" style="padding:40px;text-align:center">No data for this FY.</p>';q('#report-content').innerHTML=html;return}

  html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px">`
  empStats.forEach(emp=>{
    html+=`<div class="card" style="padding:14px;border-left:3px solid ${dc(emp.dept)}">
      <div class="flex gap-10 items-center mb-10">
        <div class="avatar avatar-md" style="background:${dc(emp.dept)}">${av(emp.name)}</div>
        <div class="flex-1 truncate">
          <p class="font-bold truncate">${esc(emp.name)}</p>
          <div class="flex gap-8 mt-4"><span class="emp-code">${esc(emp.emp_code||'')}</span>${deptBadge(emp.dept)}</div>
        </div>
      </div>
      ${compCard({title:emp.name+' — FY '+S.currentFY,tot:emp.tot,comp:emp.comp,nc:emp.nc,pct_c:emp.pct_c,pct_nc:emp.pct_nc})}
      ${emp.byMP.length?`<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
        ${emp.byMP.map(m=>`<div class="flex gap-8 items-center mb-4 text-xs">
          <span class="ref-badge">${esc(m.ref)}</span>
          <span class="flex-1"></span>
          <span style="color:var(--green);font-weight:700">✓${m.comp}</span>
          <span style="color:var(--red)">✗${m.nc}</span>
          <span style="font-weight:900;color:${pc(m.pct_c)};font-family:'Syne',sans-serif">${m.pct_c}%</span>
        </div>`).join('')}
      </div>`:''}
    </div>`
  })
  html+='</div>'
  q('#report-content').innerHTML=html
}

          <span style="color:var(--red);white-space:nowrap">✗${cn.toLocaleString()} (${cpnc}%)</span>

function renderSectors() {

  })

    <div><h2>Sectors / Departments</h2>
    <p>${sectors.length} sectors configured · Edit names, colors, and descriptions</p></div>
    <button class="btn btn-primary btn-sm" onclick="openSectorForm()">+ New Sector</button>
  </div>`

    html += `<div class="info-box"><p>No sectors configured. Click <strong>+ New Sector</strong> to add your first department.</p></div>`
  } else {
    html += '<div class="grid-3">'
    sectors.forEach(s => {
      const emps = empsBySector[s.name] || []
      const fyPerf = S.perf.filter(p => p.fy===S.currentFY && emps.some(e=>e.emp_code===p.emp_code))

      const comp = fyPerf.reduce((a,r)=>a+(r.compliant||(r.status==='C'?1:0)),0)
      const pct  = tot ? (comp/tot*100).toFixed(1) : null
      const col  = s.color || '#475569'
      const myMPs = S.mps.filter(m=>emps.some(e=>(m.owner_ids||[]).includes(e.id))).length
      const myCPs = S.cps.filter(c=>emps.some(e=>(c.owner_ids||[]).includes(e.id))).length
      html += `<div class="card" style="border-top:4px solid ${col}">
        <div class="card-body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <span class="dept-badge" style="background:${col};font-size:13px;padding:4px 12px">${esc(s.name)}</span>
            <div style="display:flex;gap:6px">
              <button class="btn-icon" onclick="openSectorForm('${s.id}')">✏</button>

            <span class="text-xs"><strong>${myMPs}</strong> MPs &nbsp;<strong>${myCPs}</strong> CPs</span>

              <span class="text-xxs text-muted">FY ${S.currentFY}</span>
              <span style="font-weight:900;font-size:13px;color:${pct>=95?'var(--green)':pct>=80?'var(--amber)':'var(--red)'}">${pct}%</span>

        </div>`).join('')}

  q('#master-content').innerHTML = html

function openSectorForm(id) {
  const sec = id ? (S.sectors||[]).find(s=>s.id===id) : null
  const PRESET = ['#0f2540','#1d4ed8','#6d28d9','#047857','#b45309','#475569','#0e7490','#be185d','#dc2626','#d97706','#16a34a','#0891b2']
  openModal(sec?`Edit Sector: ${sec.name}`:'New Sector / Department',
    `<div class="form-grid-2">
      <div class="form-group"><label class="form-label">Sector Name *</label>
        <input class="form-input" id="sf-name" value="${sec?esc(sec.name):''}" placeholder="e.g. Vehicle, Finance" oninput="if(!q('#sf-code').dataset.edited)q('#sf-code').value=this.value.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,8)"></div>
      <div class="form-group"><label class="form-label">Sector Code</label>
        <input class="form-input" id="sf-code" value="${sec?esc(sec.code||''):''}" placeholder="e.g. VEH" oninput="this.dataset.edited='1'"></div>
    </div>
    <div class="form-group"><label class="form-label">Description</label>
      <input class="form-input" id="sf-desc" value="${sec?esc(sec.description||''):''}" placeholder="Brief description"></div>
    <div class="form-group"><label class="form-label">Color</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px" id="sf-swatches">
        ${PRESET.map(c=>`<div onclick="q('#sf-color').value='${c}';qq('#sf-swatches div').forEach(d=>d.style.outline='none');this.style.outline='3px solid ${c}';q('#sf-preview').style.background='${c}'"
          style="width:28px;height:28px;border-radius:50%;background:${c};cursor:pointer;outline:${sec&&sec.color===c?'3px solid '+c:'none'}"></div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <input class="form-input" id="sf-color" value="${sec?sec.color:'#475569'}" style="width:120px;font-family:monospace" oninput="q('#sf-preview').style.background=this.value">
        <div id="sf-preview" style="width:36px;height:36px;border-radius:50%;background:${sec?sec.color:'#475569'};border:2px solid var(--border)"></div>
        <span class="text-xs text-muted">Hex color</span>
      </div>
    </div>`,
  [{label:sec?'Save Changes':'Create Sector',cls:'btn-primary',fn:async function(){
    const name=q('#sf-name').value.trim()
    if(!name){toast('Name required','error');return}
    const code=q('#sf-code').value.trim()||name.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,8)
    const payload={name,code,color:q('#sf-color').value.trim()||'#475569',description:q('#sf-desc').value.trim()}
    if(sec){payload.id=sec.id;await api.put('/api/sectors/'+sec.id,payload);toast('Sector updated','ok')}
    else{await api.post('/api/sectors',payload);toast('Sector created','ok')}
    closeModal();await loadAll();renderSectors()
  }}])
}

async function delSector(id,name){
  const emps=S.employees.filter(e=>e.dept===name)
  if(!confirm(`Delete sector "${name}"?${emps.length?'\n\n'+emps.length+' employee(s) will be moved to Ops.':''}\n\nThis cannot be undone.`))return
  await api.del('/api/sectors/'+id)
  toast(`Sector "${name}" deleted`,'ok');await loadAll();renderSectors()
}

                        ${Object.entries(sectBreak).map(kv=>`<span class="dept-badge" style="background:${SECTOR_COLORS[kv[0]]||'#475569'};font-size:9px">${kv[0]}: ${kv[1]}</span>`).join('')}
                    </div>` : ''}

                    <div style="display:flex;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">

                    </div>
                </div>

        })
        html += '</div>'
    }

    q('#master-content').innerHTML = html
}

function openLocForm(id) {
    const loc  = id ? S.locations.find(function(l){return l.id===id}) : null
    const TYPES = ['Office','Border','Warehouse','Depot','Branch']
    const typeOpts = TYPES.map(function(t){
        return '<option'+(loc&&loc.type===t?' selected':'')+'>'+t+'</option>'
    }).join('')
    const body =
        '<div class="form-grid-2">'
        + '<div class="form-group"><label class="form-label">Location Code</label>'
        + '<input class="form-input" id="lf-code" value="'+(loc?esc(loc.code):'')+'" placeholder="e.g. BORDER, WH-KTM, HQ"></div>'
        + '<div class="form-group"><label class="form-label">Type</label>'
        + '<select class="form-select" id="lf-type">'+typeOpts+'</select></div></div>'
        + '<div class="form-group"><label class="form-label">Location / Workstation Name</label>'
        + '<input class="form-input" id="lf-name" value="'+(loc?esc(loc.name):'')+'"></div>'
        + '<div class="form-group"><label class="form-label">Address / Description</label>'
        + '<input class="form-input" id="lf-addr" value="'+(loc?esc(loc.address||''):'')+'" placeholder="City or full address"></div>'
        + '<div class="form-group"><label class="form-label">Assign Staff to this Location</label>'
        + '<p class="text-xs text-muted mb-8">Staff can belong to multiple locations (e.g. border + HQ).</p>'
        + buildOwnerPicker('lf-emps', loc?loc.emp_ids||[]:[])+'</div>'

    openModal(loc?'Edit Location':'Add Workstation Location', body,
    [{label: loc?'Save Changes':'Create Location', cls:'btn-primary', fn: async function(){
        const d = {
            code:    q('#lf-code').value.trim(),
            name:    q('#lf-name').value.trim(),
            type:    q('#lf-type').value,
            address: q('#lf-addr').value.trim(),
            emp_ids: getOwnerPicked('lf-emps')
        }
        if (!d.code||!d.name) { toast('Code and name required','error'); return }
        if (loc) { d.id=loc.id; await api.put('/api/locations/'+loc.id, d) }
        else await api.post('/api/locations', d)
        toast(loc?'Location updated':'Location created','ok')
        closeModal(); await loadAll()
    }}], true)
}

async function delLoc(id) {
    if (!confirm('Delete this location? Staff assignments will be removed.')) return
    await api.del('/api/locations/'+id)
    toast('Location deleted','ok')
    await loadAll()
}

function refreshCascadeCP() {
    const pid = q('#cl-parent').value
    const sel = q('#cl-cp')
    if (!pid) { q('#cl-cp-group').style.display='none'; return }
    const myCPs = S.cps.filter(function(c) {
        return (c.owner_ids||[]).includes(pid)
    })
    sel.innerHTML = '<option value="">— Select CP —</option>' +
        myCPs.map(function(c) {
            const mp = S.mps.find(function(m){return m.id===c.mp_id})
            return `<option value="${c.id}">[${esc(c.ref)}] ${esc(c.title)} ${mp?'(under '+esc(mp.ref)+')':''}</option>`
        }).join('')
    q('#cl-cp-group').style.display = ''
}

function refreshCascadeMP() {
    const eid = q('#cl-child').value
    const sel = q('#cl-mp')
    if (!eid) { q('#cl-mp-group').style.display='none'; return }
    const myMPs = S.mps.filter(function(m) {
        return (m.owner_ids||[]).includes(eid)
    })
    sel.innerHTML = '<option value="">— Select MP —</option>' +
        myMPs.map(function(m) {
            return `<option value="${m.id}">[${esc(m.ref)}] ${esc(m.title)}</option>`

async function renderCascadeTree() {

    const empOpts = S.employees.map(function(e){

async function loadTree() {
    const eid = q('#tree-root').value
    setSpinner('tree-output')
    const url = '/api/cascade/tree' + (eid ? '?emp_id='+eid : '')
    const tree = await api.get(url)
    q('#tree-output').innerHTML = tree.length
        ? '<div style="overflow-x:auto">'+renderTreeNodes(tree, 0)+'</div>'
        : '<p class="text-sm text-muted italic">No data found.</p>'
